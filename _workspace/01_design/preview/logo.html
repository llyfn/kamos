<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: stretch; }
  .item { border: 1px solid var(--border-1); border-radius: var(--radius-md); background: var(--bg-card); padding: 16px; display:flex; flex-direction: column; align-items: center; gap: 10px; }
  .item.dark { background: var(--c-kon); border-color: var(--c-kon); }
  .item.warm { background: var(--bg-warm); }
  .mark { width: 92px; height: 92px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .item.dark .lbl { color: var(--c-mizu); }
  .wordmark { font-family: var(--font-display); font-weight: 700; font-size: 28px; letter-spacing: 0.04em; color: var(--c-kon); }
  .wordmark .jp { font-size: 16px; color: var(--c-ai); margin-left: 8px; font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <img class="mark" src="../assets/logo.png" alt="KAMOS">
      <div class="lbl">primary · on Shironeri</div>
    </div>
    <div class="item warm">
      <img class="mark" src="../assets/logo.png" alt="KAMOS">
      <div class="lbl">on Kinari paper</div>
    </div>
    <div class="item dark">
      <img class="mark" src="../assets/logo.png" alt="KAMOS" style="filter: brightness(2.5)">
      <div class="lbl">on Kon</div>
    </div>
  </div>
  <div style="margin-top:18px; padding: 18px 22px; border:1px solid var(--border-1); border-radius: var(--radius-md); background: var(--bg-card); display:flex; align-items:center; gap: 14px;">
    <img src="../assets/logo.png" style="width: 48px; height: 48px;" alt="">
    <div class="wordmark">KAMOS</div>
  </div>
</body>
</html>
