<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Type: Body & UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 32px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: none; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 130px; flex: none; }
  .specimen { flex: 1; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Body · 16 / 400</div>
    <div class="specimen kamos-body">Bright pear, soft rice. Finish lingers, faintly mineral.</div>
  </div>
  <div class="row">
    <div class="meta">Small · 14</div>
    <div class="specimen kamos-small">Kuromatsu Kenbishi · Hyōgo · Junmai</div>
  </div>
  <div class="row">
    <div class="meta">Caption · 12</div>
    <div class="specimen kamos-caption">2 hours ago · 3 toasts</div>
  </div>
  <div class="row">
    <div class="meta">Overline · 11</div>
    <div class="specimen kamos-overline">Brewery profile</div>
  </div>
  <div class="row">
    <div class="meta">Mono · 14</div>
    <div class="specimen kamos-mono">ABV 15.5% · Seimai 50%</div>
  </div>
  <div class="row">
    <div class="meta">JA display</div>
    <div class="specimen kamos-jp" style="font-size:24px">久保田 千寿 · 新潟</div>
  </div>
  <div class="row">
    <div class="meta">KO body</div>
    <div class="specimen kamos-body">니혼슈 · 쇼츄 · 리큐어</div>
  </div>
</body>
</html>
