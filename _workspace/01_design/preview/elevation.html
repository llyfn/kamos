<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .card { height: 100px; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-1); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); }
  .role { font-size: 11px; color: var(--fg-3); }
  .s1 { box-shadow: var(--shadow-1); }
  .s2 { box-shadow: var(--shadow-2); }
  .s3 { box-shadow: var(--shadow-3); }
  .si { box-shadow: var(--shadow-inset); }
</style>
</head>
<body>
  <div class="row">
    <div class="card s1"><div class="name">--shadow-1</div><div class="role">resting cards</div></div>
    <div class="card s2"><div class="name">--shadow-2</div><div class="role">hover · sheets</div></div>
    <div class="card s3"><div class="name">--shadow-3</div><div class="role">popovers · dialogs</div></div>
    <div class="card si"><div class="name">--shadow-inset</div><div class="role">pressed · inputs</div></div>
  </div>
</body>
</html>
