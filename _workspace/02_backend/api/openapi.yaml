openapi: 3.1.0
info:
  title: KAMOS API
  version: 0.1.0
  summary: KAMOS — Japanese alcoholic beverage tracking and discovery (MVP).
  description: |
    REST API for the KAMOS mobile app. All responses are JSON.

    **i18n contract:** beverage / brewery / category / flavor-tag names are
    returned as `{ "en": "...", "ja": "...", "ko": "..." }` objects. Per SPEC
    §6.5, clients fall back to `en` when the requested locale is missing.
    The server does NOT pre-resolve names based on `Accept-Language`.

    **Pagination:** every list endpoint returns the canonical envelope
    `{ items, next_cursor, has_more }`. The cursor is an opaque base64 string
    encoding the last item's keyset. Never offset.

    **Error shape:** `{ "error": "<human>", "code": "<MACHINE_CODE>" }` for
    every non-2xx response.

    **Auth:** Bearer JWT (HS256). Public endpoints are explicitly tagged. Some
    public endpoints accept optional auth to surface follow state.

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: auth
  - name: users
  - name: beverages
  - name: breweries
  - name: checkins
  - name: feed
  - name: social
  - name: collections
  - name: search
  - name: taxonomy
  - name: venues
  - name: admin

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [auth]
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: server is up
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string } } }

  # ----- AUTH -----
  /v1/auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: account created, JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/google:
    post:
      tags: [auth]
      operationId: googleLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: JWT returned (existing user OR auto-created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      security: []
      description: |
        Rotating refresh tokens. The server hashes the raw secret (SHA-256)
        and looks it up; on match it revokes the presented token and issues a
        new access + refresh pair in the same family. Re-using an already
        revoked token revokes the entire family (re-use / theft detection).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200":
          description: rotated; new access + refresh pair returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      description: |
        Revoke refresh tokens. With a body `{ "refresh_token": "..." }` only
        that token is revoked (single-device sign-out). With an empty body
        every active refresh token for the authed user is revoked
        (sign-out-everywhere). Always returns 204.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204": { description: token(s) revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/verify-email:
    post:
      tags: [auth]
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
        "410":
          description: token expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/auth/resend-verification:
    post:
      tags: [auth]
      operationId: resendVerification
      responses:
        "202":
          description: verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { sent: { type: boolean } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/password-change:
    post:
      tags: [auth]
      operationId: passwordChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "204": { description: password changed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/email-change:
    post:
      tags: [auth]
      operationId: emailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email]
              properties:
                new_email: { type: string, format: email }
      responses:
        "202":
          description: re-verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { re_verification_sent: { type: boolean } }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  # ----- USERS -----
  /v1/users/me:
    get:
      tags: [users]
      operationId: getMe
      responses:
        "200":
          description: current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [users]
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [users]
      operationId: deleteMe
      responses:
        "204": { description: account soft-deleted; username held 30 days }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/{username}:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    get:
      tags: [users]
      operationId: getUser
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: public profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/check-ins:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users]
      operationId: getUserCheckins
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of check-ins
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckin" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/followers:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowers
      description: |
        Status: scaffold-for-Phase6 — pre-wired for the followers list screen
        in a future profile iteration. No Flutter caller in MVP.
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of followers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/following:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowing
      description: |
        Status: scaffold-for-Phase6 — pre-wired for the following list screen
        in a future profile iteration. No Flutter caller in MVP.
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of users being followed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- BEVERAGES / BREWERIES -----
  /v1/beverages:
    get:
      tags: [beverages]
      operationId: listBeverages
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string, enum: [nihonshu, shochu, liqueur] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of beverages, sorted by popularity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBeverage" }

  /v1/beverages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [beverages]
      operationId: getBeverage
      security: []
      responses:
        "200":
          description: beverage detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BeverageDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/beverages/{id}/check-ins:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [beverages, checkins]
      operationId: getBeverageCheckins
      description: |
        Status: scaffold-for-Phase6 (discovery surfaces) and Phase5 (admin
        moderation by beverage). Endpoint is intentionally pre-wired; no
        Flutter caller in MVP (BeverageDetailScreen uses the inline
        `recent_check_ins` from `getBeverage`).
      security: []
      responses:
        "200":
          description: page of check-ins for this beverage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckinSummary" }

  /v1/breweries:
    get:
      tags: [breweries]
      operationId: listBreweries
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of breweries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBrewery" }

  /v1/breweries/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [breweries]
      operationId: getBrewery
      security: []
      responses:
        "200":
          description: brewery detail with beverage list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Brewery"
                  - type: object
                    properties:
                      beverages: { $ref: "#/components/schemas/PageOfBeverage" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- CHECK-INS -----
  /v1/check-ins:
    post:
      tags: [checkins]
      operationId: createCheckin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCheckinRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/check-ins/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [checkins]
      operationId: getCheckin
      description: |
        Status: scaffold-for-Phase6 (comments need a check-in detail view)
        and Phase5 (admin moderation surface). Endpoint is intentionally
        pre-wired; no Flutter caller in MVP.
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: check-in detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [checkins]
      operationId: updateCheckin
      description: |
        Status: scaffold-for-Phase5 (admin edit surface). Endpoint is
        intentionally pre-wired; no Flutter caller in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCheckinRequest" }
      responses:
        "200":
          description: updated check-in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: |
            422 Unprocessable Entity. Returned on any validation failure AND
            specifically when the client attempts to change `beverage_id`
            (SPEC §4.4).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [checkins]
      operationId: deleteCheckin
      description: |
        Status: scaffold-for-Phase5 (admin moderation). Endpoint is
        intentionally pre-wired; no Flutter caller in MVP.
      responses:
        "204": { description: soft-deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/check-ins/{id}/photos:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins]
      operationId: addCheckinPhoto
      description: |
        Attach a previously-presigned blob (see `/v1/uploads/photo-presign`)
        to this check-in. The 4-photo cap from SPEC §4.5 is enforced — the
        5th attach returns 422 `PHOTO_CAP_EXCEEDED`.

        Phase 3 shipped: the MVP `{ url }` body was replaced by `{ upload_id }`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upload_id]
              properties:
                upload_id:
                  type: string
                  format: uuid
                  description: id returned from /v1/uploads/photo-presign
      responses:
        "201":
          description: photo added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PhotoRef" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: upload_id not found (or owned by another user)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: upload already attached or orphaned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: photo cap (4) exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/uploads/photo-presign:
    post:
      tags: [checkins]
      operationId: presignPhotoUpload
      description: |
        Issue a presigned PUT URL for a check-in photo. The client PUTs the
        bytes directly to the blob store using the returned `upload_url` +
        `headers`, then calls `POST /v1/check-ins/{id}/photos` with the
        returned `upload_id` to attach it.

        Allowed `content_type`: `image/jpeg`, `image/png`, `image/webp`.
        Max `byte_size`: 10 MB (10485760 bytes).

        Returns 503 `STORAGE_DISABLED` when the deployment has not configured
        the blob backend (Cloudflare R2 credentials unset). Clients should
        gracefully fall back to "photo upload not available on this server".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type, byte_size]
              properties:
                content_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                byte_size:
                  type: integer
                  minimum: 1
                  maximum: 10485760
      responses:
        "200":
          description: presigned PUT URL issued
          content:
            application/json:
              schema:
                type: object
                required: [upload_id, upload_url, headers, blob_key, expires_at]
                properties:
                  upload_id:
                    type: string
                    format: uuid
                  upload_url:
                    type: string
                    format: uri
                  headers:
                    type: object
                    additionalProperties: { type: string }
                  blob_key:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
        "503":
          description: blob storage not configured on this server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/check-ins/{id}/toast:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins, social]
      operationId: toggleToast
      responses:
        "200":
          description: new toast state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToastState" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- VENUES -----
  /v1/venues/search:
    get:
      tags: [venues]
      operationId: searchVenues
      description: |
        Phase 4 — proxy a Foursquare Places search. Authed.

        Behavior is gated on `FOURSQUARE_API_KEY`: when empty (the dev
        default), this endpoint returns 503 `VENUE_SEARCH_DISABLED`. Mirrors
        the Phase 3 `STORAGE_DISABLED` pattern: the server boots cleanly
        without third-party credentials and the mobile client gets a
        machine-readable "feature off" signal.

        Lat+Lng are both-or-neither. When provided, results are biased to
        the geo neighborhood. The response is NOT cursor-paginated —
        Foursquare's response is bounded by `limit` and there is no upstream
        cursor to chain.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1, maxLength: 100 }
        - in: query
          name: lat
          schema: { type: number, minimum: -90, maximum: 90 }
        - in: query
          name: lng
          schema: { type: number, minimum: -180, maximum: 180 }
        - in: query
          name: locale
          schema: { type: string, enum: [en, ja, ko] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 10 }
      responses:
        "200":
          description: list of matching venues from Foursquare
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueSearchResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
        "503":
          description: |
            Foursquare integration is OFF or upstream-rate-limited. The
            response `code` field disambiguates:
              * `VENUE_SEARCH_DISABLED` — server has no `FOURSQUARE_API_KEY`.
              * `VENUE_RATE_LIMITED`    — upstream 429; `Retry-After: 1`
                                          header is set so the client can
                                          backoff cleanly.
          headers:
            Retry-After:
              description: seconds to wait before retrying (rate-limit case only)
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ----- FEED -----
  /v1/feed:
    get:
      tags: [feed]
      operationId: getFeed
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 20 }
      responses:
        "200":
          description: page of feed items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFeedItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ----- SOCIAL -----
  /v1/users/{username}/follow:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    post:
      tags: [social]
      operationId: follow
      responses:
        "200":
          description: follow status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: cannot follow self
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [social]
      operationId: unfollow
      responses:
        "204": { description: unfollowed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests:
    get:
      tags: [social]
      operationId: listFollowRequests
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: pending requests
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFollowRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests/{id}/approve:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: approveFollowRequest
      responses:
        "200":
          description: approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/follow-requests/{id}/decline:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: declineFollowRequest
      responses:
        "204": { description: declined }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- COLLECTIONS -----
  /v1/collections:
    get:
      tags: [collections]
      operationId: listCollections
      responses:
        "200":
          description: list of own collections
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCollection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [collections]
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/collections/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    get:
      tags: [collections]
      operationId: getCollection
      responses:
        "200":
          description: collection with entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Collection"
                  - type: object
                    properties:
                      entries: { $ref: "#/components/schemas/PageOfCollectionEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [collections]
      operationId: renameCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "200":
          description: renamed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [collections]
      operationId: deleteCollection
      responses:
        "204": { description: soft-deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [collections]
      operationId: addCollectionEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [beverage_id]
              properties:
                beverage_id: { type: string, format: uuid }
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: added (idempotent) }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries/{beverage_id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: beverage_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [collections]
      operationId: updateCollectionEntry
      description: |
        Status: scaffold-for-Phase6 (collection entry note edits, low cost
        to keep pre-wired). Endpoint is intentionally pre-wired; no Flutter
        caller in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: updated }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [collections]
      operationId: removeCollectionEntry
      responses:
        "204": { description: removed }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- SEARCH -----
  /v1/search:
    get:
      tags: [search]
      operationId: search
      security: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [beverage, brewery] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: search results (mixed types)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSearchResult" }

  # ----- TAXONOMY / FEEDBACK -----
  /v1/categories:
    get:
      tags: [taxonomy]
      operationId: getCategories
      description: |
        Status: scaffold-for-Phase5 — server-validated taxonomy used by the
        admin surface to populate category dropdowns. Endpoint is
        intentionally pre-wired; Flutter MVP uses local `kCategoryStrings`.
      security: []
      responses:
        "200":
          description: SPEC §2.1 categories with locale-aware labels
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryLabel" }

  /v1/flavor-tags:
    get:
      tags: [taxonomy]
      operationId: getFlavorTags
      security: []
      responses:
        "200":
          description: SPEC §4.3 taxonomy
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FlavorTag" }

  /v1/beverage-requests:
    post:
      tags: [taxonomy]
      operationId: submitBeverageRequest
      description: |
        Status: scaffold-for-Phase5 — user-submitted beverages will wire the
        user-side form on top of this endpoint. Endpoint is intentionally
        pre-wired; no Flutter caller in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: queued for admin review
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  # ==========================================================================
  # Phase 5a — admin surface. All endpoints require Bearer auth + a moderator
  # or admin role (specified per-operation). 403 ROLE_REQUIRED on mismatch;
  # 401 ACCOUNT_DELETED on revoked JWTs (SEC-006).
  # ==========================================================================

  /v1/admin/beverage-requests:
    get:
      tags: [admin]
      operationId: adminListBeverageRequests
      description: |
        List user-submitted beverage addition requests. Requires moderator
        or admin role. Cursor-paginated.
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [pending, approved, rejected] }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of requests
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdminBeverageRequest" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/beverage-requests/{id}/approve:
    post:
      tags: [admin]
      operationId: adminApproveBeverageRequest
      description: |
        Approve a pending beverage request and insert a canonical beverage
        in the same transaction. Admin role required. The admin supplies
        the canonical fields (brewery_id, category_id, name_i18n, ...)
        based on the user-submitted payload.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBeverageRequestApproval" }
      responses:
        "200":
          description: approved; beverage created
          content:
            application/json:
              schema:
                type: object
                required: [request_id, beverage_id]
                properties:
                  request_id: { type: string, format: uuid }
                  beverage_id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/beverage-requests/{id}/reject:
    post:
      tags: [admin]
      operationId: adminRejectBeverageRequest
      description: |
        Reject a pending beverage request with required reviewer notes.
        Moderator or admin role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id: { type: string, format: uuid }
                  status: { type: string, enum: [rejected] }
                  notes: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/check-ins/{id}/moderate:
    post:
      tags: [admin]
      operationId: adminModerateCheckin
      description: |
        Soft-delete a check-in regardless of owner. Moderator or admin role.
        Optional notes are recorded in the structured access log.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, maxLength: 500 }
      responses:
        "204":
          description: moderated
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/users:
    get:
      tags: [admin]
      operationId: adminListUsers
      description: |
        List users. Moderator or admin role.
      parameters:
        - in: query
          name: role
          required: false
          schema: { type: string, enum: [user, moderator, admin] }
        - in: query
          name: include_deleted
          required: false
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of users
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUser" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/users/{id}/role:
    post:
      tags: [admin]
      operationId: adminUpdateUserRole
      description: |
        Update a user's role. Admin only. Self-role-changes are blocked
        with 403 to prevent accidental admin lockout.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUserRoleUpdate" }
      responses:
        "200":
          description: role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string, format: uuid }
                  role: { type: string, enum: [user, moderator, admin] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/users/{id}/suspend:
    post:
      tags: [admin]
      operationId: adminSuspendUser
      description: |
        Admin-initiated soft-delete. Sets the 30-day username hold and
        adds the user id to the SEC-006 revocation cache so the user's
        outstanding JWTs are rejected immediately.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: suspended
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: authenticated but not allowed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: not found (or hidden by privacy)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: uniqueness or state conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Validation:
      description: validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: human-readable message
        code:
          type: string
          description: machine code (UPPER_SNAKE_CASE)

    I18nText:
      type: object
      description: |
        i18n object. `en` and `ja` are typically present; `ko` is optional.
        Per SPEC §6.5 fallback, clients should display `ko` if present, else
        `en`. Same rule for ja → en.
      required: [en]
      properties:
        en: { type: string }
        ja: { type: string }
        ko: { type: string }

    CategoryLabel:
      type: object
      required: [slug, label_i18n]
      properties:
        slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
        label_i18n:
          $ref: "#/components/schemas/I18nText"
          description: |
            SPEC §2.1 canonical strings:
            * en: 'Nihonshu (Sake)' | 'Shochu' | 'Liqueur'
            * ja: '日本酒' | '焼酎' | 'リキュール'
            * ko: '니혼슈 (사케)' | '쇼츄' | '리큐어'

    User:
      type: object
      required: [id, username, display_username, email, email_verified, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    UserStats:
      type: object
      required: [checkins, unique, followers, following]
      properties:
        checkins: { type: integer }
        unique: { type: integer }
        followers: { type: integer }
        following: { type: integer }

    Me:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required: [stats, role]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }
            role:
              # Phase 5a: surfaces RBAC state so the admin client can branch
              # on privileges. Read fresh from users.role on every request.
              $ref: "#/components/schemas/UserRole"
            deleted_at:
              type: string
              format: date-time
              nullable: true
              description: |
                Soft-delete timestamp. Normally null; non-null only in the
                rare window between admin suspension and SoftDeleteCache
                refresh.

    PublicUser:
      type: object
      description: |
        Privacy-safe User projection used by GET /v1/users/{username}.
        Email and email_verified are intentionally omitted — they are private
        to the owner and exposed only via /v1/users/me.
      required: [id, username, display_username, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    PublicProfile:
      allOf:
        - $ref: "#/components/schemas/PublicUser"
        - type: object
          required: [stats, restricted]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }
            follow_state:
              type: string
              enum: [accepted, pending, ""]
              description: status of viewer→target follow; absent if no viewer
            restricted:
              type: boolean
              description: true when target is private and viewer not approved

    UpdateMeRequest:
      type: object
      description: |
        PATCH semantics: omit a field to leave it unchanged. For the
        clearable optional fields (`bio`, `avatar_url`) send an explicit
        `null` to clear the existing value. `display_name`, `locale`, and
        `privacy_mode` are non-clearable — omit to leave unchanged.
      properties:
        display_name: { type: string, minLength: 1, maxLength: 50 }
        bio: { type: string, maxLength: 200, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]{3,30}$"
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string, minLength: 1, maxLength: 50 }
        locale: { type: string, enum: [en, ja, ko] }
        bio: { type: string, maxLength: 200, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token: { type: string, description: "Google ID token" }
        username:
          type: string
          description: "Required only on first login when a username can't be derived"
        locale:
          type: string
          enum: [en, ja, ko]

    AuthResponse:
      type: object
      required: [user, access_token, refresh_token, token_type, expires_in, refresh_expires_in]
      properties:
        user: { $ref: "#/components/schemas/User" }
        access_token: { type: string, description: "Bearer JWT (HS256), short-lived" }
        refresh_token:
          type: string
          description: |
            Raw refresh secret (base64-rawurl, 43 chars). Long-lived but
            revocable; rotated on every use via POST /v1/auth/refresh. The
            server stores only its SHA-256 hash.
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: "access-token TTL in seconds" }
        refresh_expires_in: { type: integer, description: "refresh-token TTL in seconds" }

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, description: "raw secret previously issued by the server" }

    LogoutRequest:
      type: object
      description: |
        Optional body. With `refresh_token`, only that single token is revoked.
        Without, every active refresh token for the authed user is revoked
        (sign-out-everywhere).
      properties:
        refresh_token: { type: string }

    Brewery:
      type: object
      description: |
        Optional fields (`prefecture`, `region`, `founded_year`, `website`,
        `description`, `beverage_count`) use the **absent-when-unknown**
        convention: the Go server emits them with `omitempty`, so the JSON
        key is omitted entirely rather than set to `null`. Clients should
        treat an absent key the same as `null`.
      required: [id, name, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        prefecture: { type: string }
        region: { type: string }
        founded_year: { type: integer }
        website: { type: string, format: uri }
        description: { $ref: "#/components/schemas/I18nText" }
        beverage_count:
          type: integer
          minimum: 0
          description: |
            Number of beverages associated with this brewery. Populated by
            `GetBrewery` and `ListBreweries`; absent in nested `BreweryRef`
            embeddings and in `/v1/search` brewery results.
        created_at: { type: string, format: date-time }

    Beverage:
      type: object
      description: |
        Optional fields (`subcategory`, `abv`, `polishing_ratio`, `prefecture`,
        `region`, `description`, `label_image_url`) use the **absent-when-
        unknown** convention: the Go server emits them with `omitempty`, so
        the JSON key is omitted entirely rather than set to `null`. The
        exception is `avg_rating`, which is `*float64` without `omitempty` —
        it is always present and is `null` when no ratings exist.
      required: [id, name, brewery, category, flavor_profile, avg_rating, check_in_count, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/Brewery" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        subcategory: { $ref: "#/components/schemas/I18nText" }
        abv: { type: number }
        polishing_ratio: { type: integer, description: "Nihonshu only" }
        prefecture: { type: string }
        region: { type: string }
        flavor_profile:
          type: array
          items: { type: string, description: "flavor tag slug" }
        description: { $ref: "#/components/schemas/I18nText" }
        label_image_url: { type: string, format: uri }
        avg_rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        check_in_count: { type: integer }
        created_at: { type: string, format: date-time }

    FlavorAggregate:
      type: object
      required: [slug, dimension, name, uses]
      properties:
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }
        uses: { type: integer }

    FlavorTag:
      type: object
      required: [id, slug, dimension, name]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }

    BeverageDetail:
      allOf:
        - $ref: "#/components/schemas/Beverage"
        - type: object
          required: [aggregated_flavor, recent_check_ins]
          properties:
            aggregated_flavor:
              type: array
              items: { $ref: "#/components/schemas/FlavorAggregate" }
            recent_check_ins:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }

    CheckinUser:
      type: object
      required: [id, username, display_username, display_name]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }

    BeverageRef:
      type: object
      description: |
        Compact beverage embedding used by check-in / feed / collection
        entries. `label_image_url` follows the absent-when-unknown
        convention (Go `omitempty`).
      required: [id, name, brewery, category]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/BreweryRef" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        label_image_url: { type: string, format: uri }

    BreweryRef:
      type: object
      description: |
        Compact brewery embedding used by check-in / feed / collection
        entries. `region` follows the absent-when-unknown convention
        (Go `omitempty`).
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        region: { type: string }

    PhotoRef:
      type: object
      required: [url, sort_order]
      properties:
        url: { type: string, format: uri }
        sort_order: { type: integer, minimum: 0, maximum: 3 }

    Price:
      type: object
      required: [amount, currency, mode]
      properties:
        amount: { type: number, minimum: 0 }
        currency: { type: string, enum: [JPY, KRW, USD] }
        mode: { type: string, enum: [serving, bottle] }

    Checkin:
      type: object
      required: [id, user, beverage, tags, photos, toasts, you_toasted, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating:
          type: number
          nullable: true
          minimum: 0.5
          maximum: 5.0
          description: |
            SPEC §4.2 / §6.2: 0.5–5.0 in 0.5 steps. Optional — `null` is valid
            and means "I tried this". Emit as a number, never a string.
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        photos:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/PhotoRef" }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other], nullable: true }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other], nullable: true }
        venue:
          $ref: "#/components/schemas/VenueRef"
          nullable: true
          description: |
            Phase 4 venue projection. Absent when the check-in has no venue.
        toasts: { type: integer }
        you_toasted: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CheckinSummary:
      type: object
      required: [id, user, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        created_at: { type: string, format: date-time }

    CreateCheckinRequest:
      type: object
      required: [beverage_id]
      properties:
        beverage_id: { type: string, format: uuid }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string, description: "flavor tag slug" }
        photos:
          type: array
          maxItems: 4
          items: { type: string, format: uri }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }
        venue:
          $ref: "#/components/schemas/CheckinVenueInput"
          nullable: true
          description: |
            Phase 4 optional venue tag. Three accepted shapes:
              * { id }                    — attach an existing venue UUID.
              * { foursquare_id, name }   — upsert by Foursquare id.
              * empty object              — silently dropped.

    UpdateCheckinRequest:
      type: object
      description: |
        `beverage_id` is intentionally NOT in this schema — SPEC §4.4 forbids
        changing the beverage on an existing check-in. If present in the body,
        the server returns 422.
      properties:
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }

    ToastState:
      type: object
      required: [toasts, you_toasted]
      properties:
        toasts: { type: integer }
        you_toasted: { type: boolean }

    # ----- Venues (Phase 4) -----
    VenueRef:
      type: object
      description: |
        Lightweight projection of a venue embedded on Checkin / FeedItem.
        Feed cards render "at <name>, <locality>".
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        locality: { type: string, nullable: true }
        country: { type: string, nullable: true }

    Venue:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        foursquare_id: { type: string, nullable: true }
        name: { type: string }
        address: { type: string, nullable: true }
        lat: { type: number, nullable: true, minimum: -90, maximum: 90 }
        lng: { type: number, nullable: true, minimum: -180, maximum: 180 }
        country: { type: string, nullable: true }
        prefecture: { type: string, nullable: true }
        locality: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CheckinVenueInput:
      type: object
      description: |
        Optional venue payload on POST /v1/check-ins. Three accepted shapes:
          * `{ id }` — attach an existing venue UUID.
          * `{ foursquare_id, name, ... }` — upsert by Foursquare id.
          * empty / nothing matching — silently dropped (200/201, venue
            stays absent on the resulting check-in).
      properties:
        id: { type: string, format: uuid }
        foursquare_id: { type: string }
        name: { type: string }
        address: { type: string }
        lat: { type: number, minimum: -90, maximum: 90 }
        lng: { type: number, minimum: -180, maximum: 180 }
        country: { type: string }
        prefecture: { type: string }
        locality: { type: string }

    FoursquarePlace:
      type: object
      description: |
        Foursquare Place projected to the KAMOS shape at the client edge.
        These are NOT venue rows — they are search results. Use the
        `foursquare_id` to attach one via POST /v1/check-ins.
      required: [foursquare_id, name]
      properties:
        foursquare_id: { type: string }
        name: { type: string }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        country: { type: string }
        prefecture: { type: string }
        locality: { type: string }

    VenueSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/FoursquarePlace" }

    FeedItem:
      type: object
      required: [id, user, beverage, tags, toasts, you_toasted, photo_count, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        toasts: { type: integer }
        you_toasted: { type: boolean }
        photo_count: { type: integer }
        venue:
          oneOf:
            - $ref: "#/components/schemas/VenueRef"
          nullable: true
          description: Absent when the check-in has no venue attached.
        created_at: { type: string, format: date-time }

    FollowRequest:
      type: object
      required: [user_id, username, display_username, display_name, created_at]
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    FollowResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [accepted, pending] }

    SocialUser:
      type: object
      required: [id, username, display_username, display_name, followed_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        followed_at: { type: string, format: date-time }

    Collection:
      type: object
      required: [id, name, entry_count, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 50 }
        entry_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CollectionEntry:
      type: object
      required: [beverage, added_at]
      properties:
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        note: { type: string, maxLength: 200, nullable: true }
        added_at: { type: string, format: date-time }

    SearchResult:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [beverage, brewery] }
        beverage: { $ref: "#/components/schemas/Beverage", nullable: true }
        brewery: { $ref: "#/components/schemas/Brewery", nullable: true }

    # ----- Page<T> envelopes -----
    PageBase:
      type: object
      required: [items, has_more]
      properties:
        next_cursor:
          type: string
          description: "opaque keyset cursor; absent on last page"
        has_more: { type: boolean }
    PageOfBeverage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Beverage" }
    PageOfBrewery:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Brewery" }
    PageOfCheckin:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Checkin" }
    PageOfCheckinSummary:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }
    PageOfFeedItem:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FeedItem" }
    PageOfFollowRequest:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FollowRequest" }
    PageOfSocialUser:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SocialUser" }
    PageOfCollection:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Collection" }
    PageOfCollectionEntry:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CollectionEntry" }
    PageOfSearchResult:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SearchResult" }

    # ========================================================================
    # Phase 5a — RBAC + admin
    # ========================================================================

    UserRole:
      type: string
      enum: [user, moderator, admin]
      description: |
        RBAC role from migration 007. Roles live on users.role and are
        not embedded in JWT claims, so a demotion takes effect on the
        next admin request rather than after the token TTL.

    AdminBeverageRequest:
      type: object
      required: [id, payload, status, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, nullable: true }
        username:
          type: string
          nullable: true
          description: display_username of the submitter, or null if the user was hard-purged
        payload:
          type: object
          additionalProperties: true
          description: original user-submitted free-form payload
        status: { type: string, enum: [pending, approved, rejected] }
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }

    AdminBeverageRequestApproval:
      type: object
      required: [brewery_id, category_id, name_i18n]
      properties:
        brewery_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        subcategory_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        abv:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 70
        prefecture: { type: string, nullable: true }
        region: { type: string, nullable: true }
        label_image_url: { type: string, format: uri, nullable: true }
        flavor_profile:
          type: array
          items: { type: string }
        notes:
          type: string
          nullable: true
          description: reviewer notes recorded on the request row

    AdminUser:
      type: object
      required: [id, username, display_username, email, email_verified, role, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        role: { $ref: "#/components/schemas/UserRole" }
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true

    AdminUserRoleUpdate:
      type: object
      required: [role]
      properties:
        role: { $ref: "#/components/schemas/UserRole" }
