openapi: 3.1.0
info:
  title: KAMOS API
  version: 0.1.0
  summary: KAMOS — Japanese alcoholic beverage tracking and discovery (MVP).
  description: |
    REST API for the KAMOS mobile app. All responses are JSON.

    **i18n contract:** beverage / brewery / category / flavor-tag names are
    returned as `{ "en": "...", "ja": "...", "ko": "..." }` objects. Per SPEC
    §6.5, clients fall back to `en` when the requested locale is missing.
    The server does NOT pre-resolve names based on `Accept-Language`.

    **Pagination:** every list endpoint returns the canonical envelope
    `{ items, next_cursor, has_more }`. The cursor is an opaque base64 string
    encoding the last item's keyset. Never offset.

    **Error shape:** `{ "error": "<human>", "code": "<MACHINE_CODE>" }` for
    every non-2xx response.

    **Auth:** Bearer JWT (HS256). Public endpoints are explicitly tagged. Some
    public endpoints accept optional auth to surface follow state.

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: auth
  - name: users
  - name: beverages
  - name: breweries
  - name: checkins
  - name: feed
  - name: social
  - name: collections
  - name: search
  - name: taxonomy

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [auth]
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: server is up
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string } } }

  # ----- AUTH -----
  /v1/auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: account created, JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/google:
    post:
      tags: [auth]
      operationId: googleLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: JWT returned (existing user OR auto-created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/auth/verify-email:
    post:
      tags: [auth]
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
        "410":
          description: token expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/auth/resend-verification:
    post:
      tags: [auth]
      operationId: resendVerification
      responses:
        "202":
          description: verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { sent: { type: boolean } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/password-change:
    post:
      tags: [auth]
      operationId: passwordChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "204": { description: password changed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/email-change:
    post:
      tags: [auth]
      operationId: emailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email]
              properties:
                new_email: { type: string, format: email }
      responses:
        "202":
          description: re-verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { re_verification_sent: { type: boolean } }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  # ----- USERS -----
  /v1/users/me:
    get:
      tags: [users]
      operationId: getMe
      responses:
        "200":
          description: current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [users]
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [users]
      operationId: deleteMe
      responses:
        "204": { description: account soft-deleted; username held 30 days }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/{username}:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    get:
      tags: [users]
      operationId: getUser
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: public profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/check-ins:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users]
      operationId: getUserCheckins
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of check-ins
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckin" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/followers:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowers
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of followers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/following:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowing
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of users being followed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- BEVERAGES / BREWERIES -----
  /v1/beverages:
    get:
      tags: [beverages]
      operationId: listBeverages
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string, enum: [nihonshu, shochu, liqueur] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of beverages, sorted by popularity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBeverage" }

  /v1/beverages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [beverages]
      operationId: getBeverage
      security: []
      responses:
        "200":
          description: beverage detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BeverageDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/beverages/{id}/check-ins:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [beverages, checkins]
      operationId: getBeverageCheckins
      security: []
      responses:
        "200":
          description: page of check-ins for this beverage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckinSummary" }

  /v1/breweries:
    get:
      tags: [breweries]
      operationId: listBreweries
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of breweries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBrewery" }

  /v1/breweries/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [breweries]
      operationId: getBrewery
      security: []
      responses:
        "200":
          description: brewery detail with beverage list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Brewery"
                  - type: object
                    properties:
                      beverages: { $ref: "#/components/schemas/PageOfBeverage" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- CHECK-INS -----
  /v1/check-ins:
    post:
      tags: [checkins]
      operationId: createCheckin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCheckinRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/check-ins/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [checkins]
      operationId: getCheckin
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: check-in detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [checkins]
      operationId: updateCheckin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCheckinRequest" }
      responses:
        "200":
          description: updated check-in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: |
            422 Unprocessable Entity. Returned on any validation failure AND
            specifically when the client attempts to change `beverage_id`
            (SPEC §4.4).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [checkins]
      operationId: deleteCheckin
      responses:
        "204": { description: soft-deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/check-ins/{id}/photos:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins]
      operationId: addCheckinPhoto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
      responses:
        "201":
          description: photo added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PhotoRef" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: photo cap (4) exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/check-ins/{id}/toast:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins, social]
      operationId: toggleToast
      responses:
        "200":
          description: new toast state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToastState" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- FEED -----
  /v1/feed:
    get:
      tags: [feed]
      operationId: getFeed
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 20 }
      responses:
        "200":
          description: page of feed items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFeedItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ----- SOCIAL -----
  /v1/users/{username}/follow:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    post:
      tags: [social]
      operationId: follow
      responses:
        "200":
          description: follow status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: cannot follow self
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [social]
      operationId: unfollow
      responses:
        "204": { description: unfollowed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests:
    get:
      tags: [social]
      operationId: listFollowRequests
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: pending requests
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFollowRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests/{id}/approve:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: approveFollowRequest
      responses:
        "200":
          description: approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/follow-requests/{id}/decline:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: declineFollowRequest
      responses:
        "204": { description: declined }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- COLLECTIONS -----
  /v1/collections:
    get:
      tags: [collections]
      operationId: listCollections
      responses:
        "200":
          description: list of own collections
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCollection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [collections]
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/collections/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    get:
      tags: [collections]
      operationId: getCollection
      responses:
        "200":
          description: collection with entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Collection"
                  - type: object
                    properties:
                      entries: { $ref: "#/components/schemas/PageOfCollectionEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [collections]
      operationId: renameCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "200":
          description: renamed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [collections]
      operationId: deleteCollection
      responses:
        "204": { description: soft-deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [collections]
      operationId: addCollectionEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [beverage_id]
              properties:
                beverage_id: { type: string, format: uuid }
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: added (idempotent) }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries/{beverage_id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: beverage_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [collections]
      operationId: updateCollectionEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: updated }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [collections]
      operationId: removeCollectionEntry
      responses:
        "204": { description: removed }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- SEARCH -----
  /v1/search:
    get:
      tags: [search]
      operationId: search
      security: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [beverage, brewery] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: search results (mixed types)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSearchResult" }

  # ----- TAXONOMY / FEEDBACK -----
  /v1/categories:
    get:
      tags: [taxonomy]
      operationId: getCategories
      security: []
      responses:
        "200":
          description: SPEC §2.1 categories with locale-aware labels
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryLabel" }

  /v1/flavor-tags:
    get:
      tags: [taxonomy]
      operationId: getFlavorTags
      security: []
      responses:
        "200":
          description: SPEC §4.3 taxonomy
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FlavorTag" }

  /v1/beverage-requests:
    post:
      tags: [taxonomy]
      operationId: submitBeverageRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: queued for admin review
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: authenticated but not allowed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: not found (or hidden by privacy)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: uniqueness or state conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Validation:
      description: validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: human-readable message
        code:
          type: string
          description: machine code (UPPER_SNAKE_CASE)

    I18nText:
      type: object
      description: |
        i18n object. `en` and `ja` are typically present; `ko` is optional.
        Per SPEC §6.5 fallback, clients should display `ko` if present, else
        `en`. Same rule for ja → en.
      required: [en]
      properties:
        en: { type: string }
        ja: { type: string }
        ko: { type: string }

    CategoryLabel:
      type: object
      required: [slug, label_i18n]
      properties:
        slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
        label_i18n:
          $ref: "#/components/schemas/I18nText"
          description: |
            SPEC §2.1 canonical strings:
            * en: 'Nihonshu (Sake)' | 'Shochu' | 'Liqueur'
            * ja: '日本酒' | '焼酎' | 'リキュール'
            * ko: '니혼슈 (사케)' | '쇼츄' | '리큐어'

    User:
      type: object
      required: [id, username, display_username, email, email_verified, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    UserStats:
      type: object
      required: [checkins, unique, followers, following]
      properties:
        checkins: { type: integer }
        unique: { type: integer }
        followers: { type: integer }
        following: { type: integer }

    Me:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required: [stats]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }

    PublicUser:
      type: object
      description: |
        Privacy-safe User projection used by GET /v1/users/{username}.
        Email and email_verified are intentionally omitted — they are private
        to the owner and exposed only via /v1/users/me.
      required: [id, username, display_username, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    PublicProfile:
      allOf:
        - $ref: "#/components/schemas/PublicUser"
        - type: object
          required: [stats, restricted]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }
            follow_state:
              type: string
              enum: [accepted, pending, ""]
              description: status of viewer→target follow; absent if no viewer
            restricted:
              type: boolean
              description: true when target is private and viewer not approved

    UpdateMeRequest:
      type: object
      properties:
        display_name: { type: string, minLength: 1, maxLength: 50 }
        bio: { type: string, maxLength: 200, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]{3,30}$"
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string, minLength: 1, maxLength: 50 }
        locale: { type: string, enum: [en, ja, ko] }
        bio: { type: string, maxLength: 200, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token: { type: string, description: "Google ID token" }
        username:
          type: string
          description: "Required only on first login when a username can't be derived"
        locale:
          type: string
          enum: [en, ja, ko]

    AuthResponse:
      type: object
      required: [user, access_token, token_type, expires_in]
      properties:
        user: { $ref: "#/components/schemas/User" }
        access_token: { type: string, description: "Bearer JWT (HS256)" }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: "seconds until expiry" }

    Brewery:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        prefecture: { type: string, nullable: true }
        region: { type: string, nullable: true }
        founded_year: { type: integer, nullable: true }
        website: { type: string, format: uri, nullable: true }
        description: { $ref: "#/components/schemas/I18nText", nullable: true }
        created_at: { type: string, format: date-time }

    Beverage:
      type: object
      required: [id, name, brewery, category, flavor_profile, check_in_count, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/Brewery" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        subcategory: { $ref: "#/components/schemas/I18nText", nullable: true }
        abv: { type: number, nullable: true }
        polishing_ratio: { type: integer, nullable: true, description: "Nihonshu only" }
        prefecture: { type: string, nullable: true }
        region: { type: string, nullable: true }
        flavor_profile:
          type: array
          items: { type: string, description: "flavor tag slug" }
        description: { $ref: "#/components/schemas/I18nText", nullable: true }
        label_image_url: { type: string, format: uri, nullable: true }
        avg_rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        check_in_count: { type: integer }
        created_at: { type: string, format: date-time }

    FlavorAggregate:
      type: object
      required: [slug, dimension, name, uses]
      properties:
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }
        uses: { type: integer }

    FlavorTag:
      type: object
      required: [id, slug, dimension, name]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }

    BeverageDetail:
      allOf:
        - $ref: "#/components/schemas/Beverage"
        - type: object
          required: [aggregated_flavor, recent_check_ins]
          properties:
            aggregated_flavor:
              type: array
              items: { $ref: "#/components/schemas/FlavorAggregate" }
            recent_check_ins:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }

    CheckinUser:
      type: object
      required: [id, username, display_username, display_name]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }

    BeverageRef:
      type: object
      required: [id, name, brewery, category]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/BreweryRef" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        label_image_url: { type: string, format: uri, nullable: true }

    BreweryRef:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        region: { type: string, nullable: true }

    PhotoRef:
      type: object
      required: [url, sort_order]
      properties:
        url: { type: string, format: uri }
        sort_order: { type: integer, minimum: 0, maximum: 3 }

    Price:
      type: object
      required: [amount, currency, mode]
      properties:
        amount: { type: number, minimum: 0 }
        currency: { type: string, enum: [JPY, KRW, USD] }
        mode: { type: string, enum: [serving, bottle] }

    Checkin:
      type: object
      required: [id, user, beverage, tags, photos, toasts, you_toasted, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating:
          type: number
          nullable: true
          minimum: 0.5
          maximum: 5.0
          description: |
            SPEC §4.2 / §6.2: 0.5–5.0 in 0.5 steps. Optional — `null` is valid
            and means "I tried this". Emit as a number, never a string.
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        photos:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/PhotoRef" }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other], nullable: true }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other], nullable: true }
        toasts: { type: integer }
        you_toasted: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CheckinSummary:
      type: object
      required: [id, user, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        created_at: { type: string, format: date-time }

    CreateCheckinRequest:
      type: object
      required: [beverage_id]
      properties:
        beverage_id: { type: string, format: uuid }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string, description: "flavor tag slug" }
        photos:
          type: array
          maxItems: 4
          items: { type: string, format: uri }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }

    UpdateCheckinRequest:
      type: object
      description: |
        `beverage_id` is intentionally NOT in this schema — SPEC §4.4 forbids
        changing the beverage on an existing check-in. If present in the body,
        the server returns 422.
      properties:
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }

    ToastState:
      type: object
      required: [toasts, you_toasted]
      properties:
        toasts: { type: integer }
        you_toasted: { type: boolean }

    FeedItem:
      type: object
      required: [id, user, beverage, tags, toasts, you_toasted, photo_count, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        toasts: { type: integer }
        you_toasted: { type: boolean }
        photo_count: { type: integer }
        created_at: { type: string, format: date-time }

    FollowRequest:
      type: object
      required: [user_id, username, display_username, display_name, created_at]
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    FollowResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [accepted, pending] }

    SocialUser:
      type: object
      required: [id, username, display_username, display_name, followed_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        followed_at: { type: string, format: date-time }

    Collection:
      type: object
      required: [id, name, entry_count, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 50 }
        entry_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CollectionEntry:
      type: object
      required: [beverage, added_at]
      properties:
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        note: { type: string, maxLength: 200, nullable: true }
        added_at: { type: string, format: date-time }

    SearchResult:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [beverage, brewery] }
        beverage: { $ref: "#/components/schemas/Beverage", nullable: true }
        brewery: { $ref: "#/components/schemas/Brewery", nullable: true }

    # ----- Page<T> envelopes -----
    PageBase:
      type: object
      required: [items, has_more]
      properties:
        next_cursor:
          type: string
          description: "opaque keyset cursor; absent on last page"
        has_more: { type: boolean }
    PageOfBeverage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Beverage" }
    PageOfBrewery:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Brewery" }
    PageOfCheckin:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Checkin" }
    PageOfCheckinSummary:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }
    PageOfFeedItem:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FeedItem" }
    PageOfFollowRequest:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FollowRequest" }
    PageOfSocialUser:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SocialUser" }
    PageOfCollection:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Collection" }
    PageOfCollectionEntry:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CollectionEntry" }
    PageOfSearchResult:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SearchResult" }
