name: kamos
description: KAMOS — Japanese alcoholic beverage discovery and tracking.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing & state
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Secure JWT storage (SPEC §6.9 — never SharedPreferences for the token)
  flutter_secure_storage: ^9.2.2

  # Codegen models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Misc
  intl: any
  phosphor_flutter: ^2.1.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_white.png
    - assets/images/logo_mark.png
    - assets/images/logo_mono.png
