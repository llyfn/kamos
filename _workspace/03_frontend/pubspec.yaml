name: kamos
description: KAMOS — Japanese alcoholic beverage discovery and tracking.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Routing & state
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1

  # Networking
  dio: ^5.7.0

  # Secure JWT storage (SPEC §6.9 — never SharedPreferences for the token)
  flutter_secure_storage: ^10.2.0

  # Codegen models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Misc
  intl: any
  phosphor_flutter: ^2.1.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_white.png
    - assets/images/logo_mark.png
    - assets/images/logo_mono.png
