<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Color: Neutrals & Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .swatch { border-radius: 10px; overflow: hidden; border: 1px solid var(--border-1); background: var(--bg-card); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; }
  .name { font-family: var(--font-body); font-size: 11px; font-weight: 600; color: var(--fg-1); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:var(--c-shironeri); border-bottom: 1px solid var(--border-1)"></div><div class="meta"><div class="name">Shironeri</div><div class="hex">#FCFAF6</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-kinari)"></div><div class="meta"><div class="name">Kinari</div><div class="hex">#F4EFE6</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-50)"></div><div class="meta"><div class="name">Gray 50</div><div class="hex">#F5F7FA</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-100)"></div><div class="meta"><div class="name">Gray 100</div><div class="hex">#ECEFF4</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-200)"></div><div class="meta"><div class="name">Gray 200</div><div class="hex">#DCE2EA</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-300)"></div><div class="meta"><div class="name">Gray 300</div><div class="hex">#C2CBD6</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-400)"></div><div class="meta"><div class="name">Gray 400</div><div class="hex">#95A2B3</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-500)"></div><div class="meta"><div class="name">Gray 500</div><div class="hex">#6B7787</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-600)"></div><div class="meta"><div class="name">Gray 600</div><div class="hex">#4A5462</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-700)"></div><div class="meta"><div class="name">Gray 700</div><div class="hex">#2F3640</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-gray-800)"></div><div class="meta"><div class="name">Gray 800</div><div class="hex">#1B1F26</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-sumi)"></div><div class="meta"><div class="name">Sumi</div><div class="hex">#14171F</div></div></div>
  </div>
</body>
</html>
