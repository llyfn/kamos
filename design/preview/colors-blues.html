<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Color: Japanese Blues</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .swatch { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-1); background: var(--bg-card); }
  .chip { height: 84px; }
  .meta { padding: 10px 12px; }
  .name { font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--fg-1); letter-spacing: -0.01em; }
  .jp { font-size: 11px; color: var(--fg-3); margin-top: 1px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); margin-top: 4px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:var(--c-mizu)"></div><div class="meta"><div class="name">Mizu-iro</div><div class="jp">水色 · water</div><div class="hex">#B6D6E2</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-sora)"></div><div class="meta"><div class="name">Sora-iro</div><div class="jp">空色 · sky</div><div class="hex">#88B7D6</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-hanada)"></div><div class="meta"><div class="name">Hanada</div><div class="jp">縹色 · mid</div><div class="hex">#4A86A8</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-ai)"></div><div class="meta"><div class="name" style="color:var(--fg-1)">Ai-iro</div><div class="jp">藍色 · indigo · brand</div><div class="hex">#165E83</div></div></div>
    <div class="swatch"><div class="chip" style="background:var(--c-kon)"></div><div class="meta"><div class="name">Kon</div><div class="jp">紺色 · navy</div><div class="hex">#0F2350</div></div></div>
  </div>
</body>
</html>
