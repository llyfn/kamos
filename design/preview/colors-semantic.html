<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Color: Semantic Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-page); }
  .pair { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .row { display:flex; align-items:center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border-1); }
  .dot { width: 16px; height: 16px; border-radius: 4px; border: 1px solid var(--border-1); flex: none; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); flex: 1; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  h4 { font-family: var(--font-body); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin: 0 0 8px; font-weight: 600; }
</style>
</head>
<body>
  <div class="pair">
    <div>
      <h4>Foreground</h4>
      <div class="col">
        <div class="row"><span class="dot" style="background:var(--fg-1)"></span><span class="lbl">--fg-1</span><span class="val">primary text</span></div>
        <div class="row"><span class="dot" style="background:var(--fg-2)"></span><span class="lbl">--fg-2</span><span class="val">secondary</span></div>
        <div class="row"><span class="dot" style="background:var(--fg-3)"></span><span class="lbl">--fg-3</span><span class="val">tertiary</span></div>
        <div class="row"><span class="dot" style="background:var(--fg-muted)"></span><span class="lbl">--fg-muted</span><span class="val">placeholder</span></div>
        <div class="row"><span class="dot" style="background:var(--fg-brand)"></span><span class="lbl">--fg-brand</span><span class="val">links · brand</span></div>
      </div>
    </div>
    <div>
      <h4>Surface</h4>
      <div class="col">
        <div class="row"><span class="dot" style="background:var(--bg-page)"></span><span class="lbl">--bg-page</span><span class="val">page (Shironeri)</span></div>
        <div class="row"><span class="dot" style="background:var(--bg-surface); border-color:var(--border-2)"></span><span class="lbl">--bg-surface</span><span class="val">white</span></div>
        <div class="row"><span class="dot" style="background:var(--bg-warm)"></span><span class="lbl">--bg-warm</span><span class="val">Kinari paper</span></div>
        <div class="row"><span class="dot" style="background:var(--bg-tint-mizu)"></span><span class="lbl">--bg-tint-mizu</span><span class="val">brand wash</span></div>
        <div class="row"><span class="dot" style="background:var(--bg-brand)"></span><span class="lbl">--bg-brand</span><span class="val">Ai-iro</span></div>
      </div>
    </div>
  </div>
</body>
</html>
