<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Beverage card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--bg-card); border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 14px; box-shadow: var(--shadow-1); }
  .row { display: flex; gap: 12px; }
  .label { width: 56px; height: 72px; border-radius: 6px; flex: none; display:flex; align-items:flex-end; justify-content:center; padding: 4px; color: #fff; font-family: var(--font-display); font-size: 9px; line-height: 1.1; text-align: center; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
  .label-1 { background: linear-gradient(160deg, #2A4A6B, #0F2350); }
  .label-2 { background: linear-gradient(160deg, #C97B5A, #8B4A2D); }
  .name { font-family: var(--font-display); font-size: 17px; font-weight: 600; color: var(--fg-1); line-height: 1.25; }
  .meta { font-size: 13px; color: var(--fg-2); margin-top: 2px; }
  .stats { display:flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-1); align-items: center; }
  .rating { font-family: var(--font-mono); font-size: 14px; color: var(--fg-1); font-weight: 600; }
  .star { color: var(--c-yamabuki); }
  .toasts { font-family: var(--font-mono); font-size: 13px; color: var(--c-koh); margin-left: auto; display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
  .toast-mark { width: 16px; height: auto; filter: brightness(0) saturate(100%) invert(53%) sepia(33%) saturate(645%) hue-rotate(335deg) brightness(91%) contrast(85%); }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="row">
        <div class="label label-1">獺祭<br>23</div>
        <div>
          <div class="name">Dassai 23</div>
          <div class="meta">Asahi Shuzo · Yamaguchi</div>
          <div class="meta">Junmai Daiginjo · 16.0%</div>
        </div>
      </div>
      <div class="stats">
        <span class="star">★</span>
        <span class="rating">4.5 / 5.0</span>
        <span class="toasts"><img src="../assets/logo_white.png" class="toast-mark" alt=""> 128</span>
      </div>
    </div>
    <div class="card">
      <div class="row">
        <div class="label label-2">黒霧島</div>
        <div>
          <div class="name">Kuro Kirishima</div>
          <div class="meta">Kirishima Shuzo · Miyazaki</div>
          <div class="meta">Imo Shochu · 25.0%</div>
        </div>
      </div>
      <div class="stats">
        <span class="star">★</span>
        <span class="rating">4.0 / 5.0</span>
        <span class="toasts"><img src="../assets/logo_white.png" class="toast-mark" alt=""> 41</span>
      </div>
    </div>
  </div>
</body>
</html>
