<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAMOS — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 72px; background: var(--bg-tint-mizu); border: 1px solid var(--c-hanada); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .v { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="name">--radius-xs</div><div class="v">4 px · inputs in tight rows</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">--radius-sm</div><div class="v">8 px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">--radius-md</div><div class="v">12 px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">--radius-lg</div><div class="v">16 px · modals</div></div>
    <div class="item"><div class="box" style="border-radius:24px 24px 0 0"></div><div class="name">--radius-xl</div><div class="v">24 px top · sheets</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill); width:96px; height:40px"></div><div class="name">--radius-pill</div><div class="v">buttons · chips</div></div>
  </div>
</body>
</html>
