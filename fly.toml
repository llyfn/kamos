# Fly.io app definition — KAMOS dev environment.
#
# Single image, two processes:
#   - server: chi HTTP listener on :8080, N replicas (min 2 to exercise the
#             cross-replica LISTEN/NOTIFY cache invalidation path).
#   - worker: background-job scheduler, single replica. The pg_try_advisory_lock
#             guard in internal/jobs/ is a safety net, not a license to scale.
#
# auto_stop_machines is intentionally OFF for server: each replica holds a
# persistent Postgres LISTEN connection (internal/cache/invalidator.go) that
# would not survive scale-to-zero.
#
# Image is built externally (by .github/workflows/deploy-dev.yml) and pushed
# to GHCR; `flyctl deploy --image ghcr.io/<owner>/kamos-api:<sha>` consumes it.
# `[build]` is still declared so `flyctl deploy` without --image (manual ops)
# falls back to the remote builder against backend/Dockerfile.

app = "kamos-dev"
primary_region = "nrt"

[build]
  dockerfile = "backend/Dockerfile"

[processes]
  server = "/usr/local/bin/server"
  worker = "/usr/local/bin/worker"

[env]
  PORT = "8080"
  WORKER_METRICS_PORT = "9091"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ["server"]

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["server"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]

[deploy]
  strategy = "rolling"
