# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.freezed.dart"
    - "**/*.g.dart"
    - "lib/l10n/app_localizations*.dart"
    - "build/**"
    - "ios/**"
    - "android/**"
  errors:
    # Stage 2: strict lints below are advisory only. Stage 8 will raise these
    # back to warning/error severity once the codebase is fully cleaned up.
    prefer_final_fields: info
    prefer_final_locals: info
    prefer_const_constructors: info
    prefer_const_constructors_in_immutables: info
    prefer_const_declarations: info
    prefer_const_literals_to_create_immutables: info
    require_trailing_commas: info
    use_super_parameters: info
    unawaited_futures: info
    avoid_void_async: info
    prefer_relative_imports: info
    directives_ordering: info
    sort_pub_dependencies: info
    sort_constructors_first: info
    cancel_subscriptions: info
    close_sinks: info
    only_throw_errors: info
    avoid_dynamic_calls: info

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Stage 2 tooling baseline: the rules below are enabled but demoted to `info`
  # severity in the `analyzer.errors` block above so that CI continues to pass
  # while Stage 8 sweeps the resulting findings.
  rules:
    - prefer_final_fields
    - prefer_final_locals
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - require_trailing_commas
    - use_super_parameters
    - unawaited_futures
    - avoid_void_async
    - prefer_relative_imports
    - directives_ordering
    - sort_pub_dependencies
    - sort_constructors_first
    - cancel_subscriptions
    - close_sinks
    - only_throw_errors
    - avoid_dynamic_calls

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
