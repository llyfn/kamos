name: kamos
description: KAMOS — Japanese alcoholic beverage discovery and tracking.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  # HTTP response cache + ETag/If-None-Match round-trips on the authed Dio
  # singleton (Phase 7). In-memory only for now (MemCacheStore).
  dio_cache_interceptor: ^4.0.6
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  # Secure JWT storage (SPEC §6.9 — never SharedPreferences for the token).
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  # Google sign-in (gated behind --dart-define=KAMOS_GOOGLE_SIGN_IN_ENABLED=true;
  # platform config files must also be in place — see README "Google sign-in setup").
  google_sign_in: ^7.2.0
  image_picker: ^1.1.2
  intl: any
  json_annotation: ^4.12.0
  phosphor_flutter: ^2.1.0
  # Crash & error reporting (no-op when KAMOS_SENTRY_DSN is empty).
  sentry_flutter: ^9.22.0
  # Mark-on-scroll in the notifications screen (SPEC §5.4): debounced
  # 50%-visible-for-500ms threshold per design/notifications_ux.md §3.1.
  visibility_detector: ^0.4.0+2

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_secure_storage_platform_interface: any
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.2
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.png
    - assets/images/logo_white.png
    - assets/images/logo_mark.png
    - assets/images/logo_mono.png
