name: Deploy

# Auto-deploys main to the kamos Fly.io app after CI passes.
# Builds on Fly's remote builder (pushes to registry.fly.io, authed natively
# by FLY_API_TOKEN) and deploys — no external registry, no private-image auth.
# Then stages APP_VERSION and runs a lightweight liveness check.
#
# Migrations are NOT run here — they're a manual operator step (the DB is a
# separate Fly app on a private network the deploy-scoped token can't reach).
# See docs/runbooks/deploy.md §2.
#
# Required GitHub `production` environment secret:
#   FLY_API_TOKEN — a deploy token for the `kamos` app (`flyctl tokens create deploy -a kamos`)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false   # never abort a half-done deploy

permissions:
  contents: read

jobs:
  deploy:
    # On workflow_dispatch the event has no `workflow_run.conclusion`;
    # on the workflow_run trigger we gate on it being 'success'.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve SHA
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: superfly/flyctl-actions/setup-flyctl@1.6

      # working-directory: backend so the Dockerfile's build context is this
      # dir (it does `COPY go.mod go.sum ./`); fly.toml lives here too.
      - name: Deploy to Fly (remote build)
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --strategy rolling --wait-timeout 300

      - name: Set APP_VERSION secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set APP_VERSION=${{ steps.sha.outputs.sha }} -a kamos --stage
          # --stage avoids triggering a second deploy; applies on next restart.

      # Lightweight liveness check. The comprehensive integration suite already
      # ran pre-deploy in ci.yml; here we only confirm the new release boots,
      # reaches the DB, and serves. Hits the always-available Fly host, not
      # api.kamos.app (whose cert is "Not verified" pending external DNS), so
      # the gate isn't coupled to DNS. Switch BASE once certs show verified.
      - name: Post-deploy liveness
        env:
          BASE: https://kamos.fly.dev
        run: |
          set -e
          for i in $(seq 1 18); do
            if curl -fsS "$BASE/healthz" >/dev/null 2>&1; then break; fi
            echo "waiting for API ($i)…"; sleep 5
          done
          curl -fsS "$BASE/healthz" | grep -q '"status":"ok"'
          # Public read path exercises router → handler → DB → serialization.
          curl -fsS "$BASE/v1/categories" | grep -q "Nihonshu"
          echo "post-deploy liveness OK"
