name: Deploy dev

# Auto-deploys main to the kamos-dev Fly.io app after CI passes.
# - Builds backend/Dockerfile, pushes to GHCR with both <sha> and dev-latest tags.
# - Applies migrations against the dev DB via a one-shot postgres:18-alpine container.
# - Runs `flyctl deploy --image` so the deployed artifact is the exact image we tagged.
# - Smoke-tests https://dev-api.kamos.app/ end-to-end — this is the real smoke gate
#   (the CI integration-smoke job is advisory because it doesn't start the API).
#
# Required GitHub secrets (set on the `dev` environment):
#   FLY_API_TOKEN     — `flyctl auth token` output
#   DEV_DATABASE_URL  — admin Postgres connection string (sslmode=require)
#
# GITHUB_TOKEN with packages:write is enough for GHCR push.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false   # never abort a half-done deploy

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    # On workflow_dispatch the event has no `workflow_run.conclusion`;
    # on the workflow_run trigger we gate on it being 'success'.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image tag
        id: tag
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/kamos-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.sha }}
            ${{ steps.tag.outputs.image }}:dev-latest
          cache-from: type=registry,ref=${{ steps.tag.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tag.outputs.image }}:buildcache,mode=max

      - name: Apply migrations
        env:
          PSQL_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          docker run --rm \
            -v "$PWD/migrations:/m:ro" \
            -e PSQL_URL \
            postgres:18-alpine \
            sh -c 'set -e; for f in /m/*.sql; do echo "→ $(basename "$f")"; psql "$PSQL_URL" -v ON_ERROR_STOP=1 -f "$f"; done'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --app kamos-dev \
            --image ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.sha }} \
            --strategy rolling \
            --wait-timeout 300

      - name: Set APP_VERSION secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl secrets set APP_VERSION=${{ steps.tag.outputs.sha }} -a kamos-dev --stage
          # --stage avoids triggering a second deploy; the value applies on next restart.

      - name: Post-deploy smoke
        env:
          API_BASE_URL: https://dev-api.kamos.app
        run: scripts/smoke.sh
