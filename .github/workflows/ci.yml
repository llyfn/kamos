name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal read-only scopes for every job. pull-requests:read is required by
# dorny/paths-filter, which calls the PR listFiles API on pull_request events
# (on push it diffs git locally). Without it, PRs — including every Dependabot
# PR — fail the changes job with "Resource not accessible by integration".
permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      admin: ${{ steps.filter.outputs.admin }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            migrations:
              - 'migrations/**'
              - '.sqlfluffrc'
              - '.github/workflows/ci.yml'
            admin:
              - 'admin/**'
              - '.github/workflows/ci.yml'
            ci:
              - '.github/workflows/ci.yml'

  backend-go:
    name: Backend (Go)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go mod download
        run: go mod download
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend
          args: --config ../.golangci.yml --issues-exit-code=1
      - name: go test
        run: go test ./... -short

  frontend-flutter:
    name: Frontend (Flutter)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      - name: flutter analyze
        run: flutter analyze
      - name: flutter test
        run: flutter test

  sql-lint:
    name: SQL Lint
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install sqlfluff
        run: pip install sqlfluff==4.2.1
      - name: sqlfluff lint
        run: sqlfluff lint migrations/ --config .sqlfluffrc

  tokens-codegen:
    name: Design tokens codegen drift check
    runs-on: ubuntu-latest
    # Run on every PR + main push. The job is cheap (a single node
    # invocation + git diff) and the gate it provides — "design/tokens.json
    # is the source of truth for admin/src/lib/tokens.ts" — is REQUIRED
    # for merge. If you edit one without the other, this fails.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run gen-tokens.sh
        run: scripts/gen-tokens.sh
      - name: Fail on drift
        run: git diff --exit-code -- admin/src/lib/tokens.ts

  admin-build:
    name: Admin (React/TS)
    needs: changes
    if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - name: npm ci
        run: npm ci
      - name: biome check
        run: npx biome check src/
      - name: npm run build
        run: npm run build

  # The Go integration suite (build tag `integration`) runs the API
  # in-process against a real Postgres 18 and seeds/truncates its own data
  # per test. This is the real pre-merge integration gate — far better than
  # the old curl smoke.sh, which needed a pre-seeded DB. (smoke.sh remains a
  # manual `make smoke` tool.)
  integration-test:
    name: Integration tests
    needs: [backend-go]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.migrations == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # WHY: services: block is replaced with an explicit build + docker run.
    # Migration 004 needs pg_bigm, which isn't on the stock postgres:18 image;
    # db/Dockerfile.dev mirrors the prod custom image (see runbook §1a) and
    # is what local docker-compose builds for the same reason. services: blocks
    # can't reference a locally-built image, so we build and run Postgres
    # manually with the same env the old services: block exposed.
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build kamos-postgres dev image (pg_bigm)
        uses: docker/build-push-action@v7
        with:
          context: db
          file: db/Dockerfile.dev
          tags: kamos/postgres:ci
          load: true
          cache-from: type=gha,scope=kamos-postgres-dev
          cache-to: type=gha,scope=kamos-postgres-dev,mode=max
      - name: Start Postgres
        run: |
          docker run -d --name kamos-pg-ci \
            -e POSTGRES_USER=kamos \
            -e POSTGRES_PASSWORD=kamos \
            -e POSTGRES_DB=kamos_test \
            -p 5432:5432 \
            --health-cmd="pg_isready -U kamos" \
            --health-interval=2s \
            --health-timeout=5s \
            --health-retries=15 \
            kamos/postgres:ci
          for i in {1..30}; do
            status=$(docker inspect --format='{{.State.Health.Status}}' kamos-pg-ci 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then echo "postgres ready"; exit 0; fi
            sleep 2
          done
          echo "postgres did not reach healthy in time"; docker logs kamos-pg-ci; exit 1
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Apply migrations
        env:
          PSQL_URL: postgres://kamos:kamos@localhost:5432/kamos_test?sslmode=disable
        run: make db-migrate
      - name: Integration tests
        working-directory: backend
        env:
          INTEGRATION_DATABASE_URL: postgres://kamos:kamos@localhost:5432/kamos_test?sslmode=disable
          JWT_SECRET: ci-integration-test-secret-at-least-32-bytes-long-aaaa
        run: go test -tags=integration ./tests/integration/...
