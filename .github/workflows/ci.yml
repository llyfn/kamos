name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
      admin: ${{ steps.filter.outputs.admin }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            migrations:
              - 'migrations/**'
              - '.sqlfluffrc'
              - '.github/workflows/ci.yml'
            admin:
              - 'admin/**'
              - '.github/workflows/ci.yml'
            ci:
              - '.github/workflows/ci.yml'

  backend-go:
    name: Backend (Go)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go mod download
        run: go mod download
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      # golangci-lint: 184 outstanding findings tracked for Stage 8 cleanup
      # (contextcheck, noctx, revive, gosec, staticcheck). Remains advisory
      # until that PR lands. golangci-lint-action@v7 is required because
      # the binary pinned at v2.12.2 isn't supported by v6 of the action.
      - name: golangci-lint (advisory until Stage 8)
        uses: golangci/golangci-lint-action@v7
        continue-on-error: true
        with:
          version: v2.12.2
          working-directory: backend
          args: --config ../.golangci.yml --issues-exit-code=0
      - name: go test
        run: go test ./... -short

  frontend-flutter:
    name: Frontend (Flutter)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: flutter pub get
        run: flutter pub get
      # flutter analyze: 38 outstanding infos + warnings (directives_ordering,
      # inference_failure_*, etc.) tracked for Stage 8 cleanup. Remains
      # advisory until that PR lands.
      - name: flutter analyze (advisory until Stage 8)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - name: flutter test
        run: flutter test

  # SQL lint: existing migrations have CP03/LT02 noise tracked for Stage 8.
  # Remains advisory until that cleanup PR.
  sql-lint:
    name: SQL Lint (advisory until Stage 8)
    needs: changes
    if: needs.changes.outputs.migrations == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install sqlfluff
        run: pip install sqlfluff==4.2.1
      - name: sqlfluff lint
        run: sqlfluff lint migrations/ --config .sqlfluffrc

  tokens-codegen:
    name: Design tokens codegen drift check
    runs-on: ubuntu-latest
    # Run on every PR + main push. The job is cheap (a single node
    # invocation + git diff) and the gate it provides — "design/tokens.json
    # is the source of truth for admin/src/lib/tokens.ts" — is REQUIRED
    # for merge. If you edit one without the other, this fails.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run gen-tokens.sh
        run: scripts/gen-tokens.sh
      - name: Fail on drift
        run: git diff --exit-code -- admin/src/lib/tokens.ts

  admin-build:
    name: Admin (React/TS)
    needs: changes
    if: needs.changes.outputs.admin == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - name: npm ci
        run: npm ci
      # biome: 24 outstanding import-sort errors tracked for Stage 8.
      - name: biome check (advisory until Stage 8)
        run: npx biome check src/ || true
      - name: npm run build
        run: npm run build

  # Integration smoke in CI is advisory: the job applies migrations against
  # a local Postgres but does not start the API server, so smoke.sh has
  # nothing to hit. The hard smoke gate is the post-deploy step in
  # .github/workflows/deploy.yml, which exercises the live API.
  # Fixing CI to spin up its own server is tracked separately.
  integration-smoke:
    name: Integration smoke (advisory; real gate is post-deploy)
    needs: [backend-go]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: kamos
          POSTGRES_PASSWORD: kamos
          POSTGRES_DB: kamos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kamos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Apply migrations
        env:
          PSQL_URL: postgres://kamos:kamos@localhost:5432/kamos?sslmode=disable
        run: make db-migrate
      - name: Run smoke script
        run: |
          if [ -x scripts/smoke.sh ]; then
            scripts/smoke.sh
          else
            echo "No smoke script available, skipping."
          fi
