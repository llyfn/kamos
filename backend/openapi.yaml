openapi: 3.1.0
info:
  title: KAMOS API
  version: 0.1.0
  summary: KAMOS — Japanese alcoholic beverage tracking and discovery (MVP).
  description: |
    REST API for the KAMOS mobile app. All responses are JSON.

    **i18n contract:** beverage / brewery / category / flavor-tag names are
    returned as `{ "en": "...", "ja": "...", "ko": "..." }` objects. Per SPEC
    §6.5, clients fall back to `en` when the requested locale is missing.
    The server does NOT pre-resolve names based on `Accept-Language`.

    **Pagination:** every list endpoint returns the canonical envelope
    `{ items, next_cursor, has_more }`. The cursor is an opaque base64 string
    encoding the last item's keyset. Never offset.

    **Error shape:** `{ "error": "<human>", "code": "<MACHINE_CODE>" }` for
    every non-2xx response.

    **Auth:** Bearer JWT (HS256). Public endpoints are explicitly tagged. Some
    public endpoints accept optional auth to surface follow state.

servers:
  - url: http://localhost:8080
    description: local dev

tags:
  - name: auth
  - name: users
  - name: beverages
  - name: breweries
  - name: checkins
  - name: feed
  - name: social
  - name: collections
  - name: search
  - name: taxonomy
  - name: venues
  - name: admin

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [auth]
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: server is up
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string } } }

  # ----- AUTH -----
  /v1/auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: account created, JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: JWT returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/google:
    post:
      tags: [auth]
      operationId: googleLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoogleLoginRequest" }
      responses:
        "200":
          description: JWT returned (existing user OR auto-created)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      security: []
      description: |
        Rotating refresh tokens. The server hashes the raw secret (SHA-256)
        and looks it up; on match it revokes the presented token and issues a
        new access + refresh pair in the same family. Re-using an already
        revoked token revokes the entire family (re-use / theft detection).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200":
          description: rotated; new access + refresh pair returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      description: |
        Revoke refresh tokens. With a body `{ "refresh_token": "..." }` only
        that token is revoked (single-device sign-out). With an empty body
        every active refresh token for the authed user is revoked
        (sign-out-everywhere). Always returns 204.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "204": { description: token(s) revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/admin-login:
    post:
      tags: [auth]
      operationId: adminLogin
      security: []
      description: |
        Admin / moderator sign-in for the React admin client. Validates
        the credentials, asserts the user's role is `moderator` or `admin`,
        and sets three HttpOnly cookies (access, refresh, csrf).
        Response body carries the user's `Me` shape.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: cookies set; body carries user
          headers:
            Set-Cookie:
              schema: { type: string }
              description: kamos_admin_access / kamos_admin_refresh / kamos_admin_csrf
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/auth/admin-refresh:
    post:
      tags: [auth]
      operationId: adminRefresh
      security: []
      description: |
        Read kamos_admin_refresh cookie, rotate via the same atomic-rotate
        contract as /v1/auth/refresh, and emit fresh Set-Cookie headers
        for access + refresh + csrf. Returns 204.
      responses:
        "204":
          description: cookies rotated
          headers:
            Set-Cookie:
              schema: { type: string }
              description: refreshed kamos_admin_* cookies
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/admin-logout:
    post:
      tags: [auth]
      operationId: adminLogout
      security:
        - adminCookieAuth: []
        - bearerAuth: []
      description: |
        Revoke the kamos_admin_refresh token and clear all three admin
        cookies with Max-Age=-1.
      responses:
        "204":
          description: cookies cleared
          headers:
            Set-Cookie:
              schema: { type: string }
              description: kamos_admin_* cookies with Max-Age=-1
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /verify:
    get:
      tags: [auth]
      operationId: verifyEmailLandingPage
      security: []
      summary: Localized HTML landing page that consumes an email-verification token.
      description: |
        Public, top-level route (NOT under `/v1`). The target of the link in
        the verification email. Consumes the token server-side and renders a
        small branded HTML page (Verified / AlreadyVerified / Invalid).
        Mobile clients do not call this endpoint programmatically — the app
        lands the user on a "Check your email" pending screen and polls
        `/v1/users/me` for the verification flip.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
        - in: query
          name: lang
          required: false
          description: Locale for the rendered page. Defaults to `en` when omitted or unrecognized.
          schema:
            type: string
            enum: [en, ja, ko]
      responses:
        "200":
          description: HTML page rendered (Verified or AlreadyVerified state).
          content:
            text/html: {}
        "400":
          description: HTML page rendered (Invalid or missing token).
          content:
            text/html: {}

  /v1/auth/verify-email:
    post:
      tags: [auth]
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified: { type: boolean }
        "410":
          description: token expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/auth/resend-verification:
    post:
      tags: [auth]
      operationId: resendVerification
      responses:
        "202":
          description: verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { sent: { type: boolean } }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/password-change:
    post:
      tags: [auth]
      operationId: passwordChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        "204": { description: password changed }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/auth/email-change:
    post:
      tags: [auth]
      operationId: emailChange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email]
              properties:
                new_email: { type: string, format: email }
      responses:
        "202":
          description: re-verification email queued
          content:
            application/json:
              schema:
                type: object
                properties: { re_verification_sent: { type: boolean } }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  # ----- USERS -----
  /v1/users/me:
    get:
      tags: [users]
      operationId: getMe
      responses:
        "200":
          description: current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [users]
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMeRequest" }
      responses:
        "200":
          description: updated user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [users]
      operationId: deleteMe
      responses:
        "204": { description: account soft-deleted; username held 30 days }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/users/search:
    get:
      tags: [users]
      operationId: searchUsers
      security:
        - bearerAuth: []
        - {}
      description: |
        Case-insensitive user lookup ranked by match quality:
        username prefix > display_name prefix > contains-either. Only
        public-safe fields are returned (PublicUser); follower counts
        and private data are not exposed.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 100 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of matching users
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfPublicUser" }
        "400":
          description: |
            INVALID_QUERY — `q` is missing, empty, or shorter than 2
            characters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/users/{username}:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    get:
      tags: [users]
      operationId: getUser
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: public profile
          headers:
            Cache-Control:
              description: |
                Stage 7 (M-3.5) — emitted by middleware:
                `private, must-revalidate`. The response varies by the
                viewer's follow_state / restricted flag, so a shared
                cache entry would leak relationship signal across
                viewers. Only the end-user's browser/app may cache,
                and only after revalidating each time.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicProfile" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/check-ins:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users]
      operationId: getUserCheckins
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of check-ins
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckin" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/collections:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, collections]
      operationId: getUserCollections
      security:
        - bearerAuth: []
        - {}
      description: |
        Visibility-gated page of the named user's collections.
        Owner-as-viewer sees all live rows; every other viewer (including
        anonymous) sees only `visibility = 'public'`. 404 when the
        username does not resolve. Cursor on (created_at, id) DESC.
      responses:
        "200":
          description: page of collections owned by the named user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCollection" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/followers:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowers
      description: |
        Status: scaffold-for-Phase6 — pre-wired for the followers list screen
        in a future profile iteration. No Flutter caller in MVP.
      x-internal: true
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of followers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/users/{username}/following:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [users, social]
      operationId: getUserFollowing
      description: |
        Status: scaffold-for-Phase6 — pre-wired for the following list screen
        in a future profile iteration. No Flutter caller in MVP.
      x-internal: true
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: page of users being followed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSocialUser" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- BEVERAGES / BREWERIES -----
  /v1/beverages:
    get:
      tags: [beverages]
      operationId: listBeverages
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string, enum: [nihonshu, shochu, liqueur] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of beverages, sorted by popularity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBeverage" }

  /v1/beverages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [beverages]
      operationId: getBeverage
      security: []
      responses:
        "200":
          description: beverage detail
          headers:
            Cache-Control:
              description: |
                Stage 7 (M-3.5) — emitted by middleware:
                `public, max-age=300, stale-while-revalidate=86400`.
                Short max-age because avg_rating + check_in_count drift
                as new check-ins land; the in-process LRU is busted on
                write but downstream caches honor this header.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BeverageDetail" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/beverages/{id}/check-ins:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    get:
      tags: [beverages, checkins]
      operationId: getBeverageCheckins
      description: |
        Status: scaffold-for-Phase6 (discovery surfaces) and Phase5 (admin
        moderation by beverage). Endpoint is intentionally pre-wired; no
        Flutter caller in MVP (BeverageDetailScreen uses the inline
        `recent_check_ins` from `getBeverage`).
      x-internal: true
      security: []
      responses:
        "200":
          description: page of check-ins for this beverage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCheckinSummary" }

  /v1/breweries:
    get:
      tags: [breweries]
      operationId: listBreweries
      security: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of breweries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfBrewery" }

  /v1/breweries/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [breweries]
      operationId: getBrewery
      security: []
      responses:
        "200":
          description: brewery detail with beverage list
          headers:
            Cache-Control:
              description: |
                Stage 7 (M-3.5) — emitted by middleware:
                `public, max-age=600, stale-while-revalidate=86400`.
                Slower-moving aggregates than beverage detail; the
                in-process LRU is busted on writes to the brewery's
                beverages and downstream caches honor this header.
              schema: { type: string }
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Brewery"
                  - type: object
                    properties:
                      beverages: { $ref: "#/components/schemas/PageOfBeverage" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- CHECK-INS -----
  /v1/check-ins:
    post:
      tags: [checkins]
      operationId: createCheckin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCheckinRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/check-ins/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [checkins]
      operationId: getCheckin
      description: |
        Status: scaffold-for-Phase6 (comments need a check-in detail view)
        and Phase5 (admin moderation surface). Endpoint is intentionally
        pre-wired; no Flutter caller in MVP.
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: check-in detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [checkins]
      operationId: updateCheckin
      description: |
        Status: scaffold-for-Phase5 (admin edit surface). Endpoint is
        intentionally pre-wired; no Flutter caller in MVP.
      x-internal: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCheckinRequest" }
      responses:
        "200":
          description: updated check-in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Checkin" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: |
            422 Unprocessable Entity. Returned on any validation failure AND
            specifically when the client attempts to change `beverage_id`
            (SPEC §4.4).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [checkins]
      operationId: deleteCheckin
      description: |
        Status: scaffold-for-Phase5 (admin moderation). Endpoint is
        intentionally pre-wired; no Flutter caller in MVP.
      x-internal: true
      responses:
        "204": { description: soft-deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/check-ins/{id}/comments:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [check-ins]
      operationId: listComments
      security: []
      description: |
        Phase 6a. Flat list of comments on a check-in, most-recent-first.
        OptionalAuth — works with or without a Bearer token. Cursor
        pagination on (created_at, id) DESC; soft-deleted rows are
        excluded.
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of comments
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfComment" }
    post:
      tags: [check-ins]
      operationId: createComment
      description: |
        Phase 6a. Post a comment on a check-in. Rate-limited to 3 rps /
        burst 6 per authed user on top of the global authed limit. Body is
        1..500 chars; NUL byte and ASCII C0 control characters except tab
        / newline are rejected with a 422.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/comments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [check-ins]
      operationId: deleteComment
      description: |
        Phase 6a. Soft-delete a comment. Allowed if the caller owns the
        comment OR holds moderator/admin role. Moderator/admin path also
        writes a moderation_log row with optional `notes` from the body.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, maxLength: 1000 }
      responses:
        "204":
          description: soft-deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/check-ins/{id}/photos:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins]
      operationId: addCheckinPhoto
      description: |
        Attach a previously-presigned blob (see `/v1/uploads/photo-presign`)
        to this check-in. The 4-photo cap from SPEC §4.5 is enforced — the
        5th attach returns 422 `PHOTO_CAP_EXCEEDED`.

        Phase 3 shipped: the MVP `{ url }` body was replaced by `{ upload_id }`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upload_id]
              properties:
                upload_id:
                  type: string
                  format: uuid
                  description: id returned from /v1/uploads/photo-presign
      responses:
        "201":
          description: photo added
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PhotoRef" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: upload_id not found (or owned by another user)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: upload already attached or orphaned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "422":
          description: photo cap (4) exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/uploads/photo-presign:
    post:
      tags: [checkins]
      operationId: presignPhotoUpload
      description: |
        Issue a presigned PUT URL for a check-in photo. The client PUTs the
        bytes directly to the blob store using the returned `upload_url` +
        `headers`, then calls `POST /v1/check-ins/{id}/photos` with the
        returned `upload_id` to attach it.

        Allowed `content_type`: `image/jpeg`, `image/png`, `image/webp`.
        Max `byte_size`: 10 MB (10485760 bytes).

        Returns 503 `STORAGE_DISABLED` when the deployment has not configured
        the blob backend (Cloudflare R2 credentials unset). Clients should
        gracefully fall back to "photo upload not available on this server".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_type, byte_size]
              properties:
                content_type:
                  type: string
                  enum: [image/jpeg, image/png, image/webp]
                byte_size:
                  type: integer
                  minimum: 1
                  maximum: 10485760
      responses:
        "200":
          description: presigned PUT URL issued
          content:
            application/json:
              schema:
                type: object
                required: [upload_id, upload_url, headers, blob_key, expires_at]
                properties:
                  upload_id:
                    type: string
                    format: uuid
                  upload_url:
                    type: string
                    format: uri
                  headers:
                    type: object
                    additionalProperties: { type: string }
                  blob_key:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
        "503":
          description: blob storage not configured on this server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/check-ins/{id}/toast:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [checkins, social]
      operationId: toggleToast
      responses:
        "200":
          description: new toast state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ToastState" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- VENUES -----
  /v1/venues/search:
    get:
      tags: [venues]
      operationId: searchVenues
      description: |
        Phase 4 — proxy a Foursquare Places search. Authed.

        Behavior is gated on `FOURSQUARE_API_KEY`: when empty (the dev
        default), this endpoint returns 503 `VENUE_SEARCH_DISABLED`. Mirrors
        the Phase 3 `STORAGE_DISABLED` pattern: the server boots cleanly
        without third-party credentials and the mobile client gets a
        machine-readable "feature off" signal.

        Lat+Lng are both-or-neither. When provided, results are biased to
        the geo neighborhood. The response is NOT cursor-paginated —
        Foursquare's response is bounded by `limit` and there is no upstream
        cursor to chain.
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 1, maxLength: 100 }
        - in: query
          name: lat
          schema: { type: number, minimum: -90, maximum: 90 }
        - in: query
          name: lng
          schema: { type: number, minimum: -180, maximum: 180 }
        - in: query
          name: locale
          schema: { type: string, enum: [en, ja, ko] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 10 }
      responses:
        "200":
          description: list of matching venues from Foursquare
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VenueSearchResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }
        "503":
          description: |
            Foursquare integration is OFF or upstream-rate-limited. The
            response `code` field disambiguates:
              * `VENUE_SEARCH_DISABLED` — server has no `FOURSQUARE_API_KEY`.
              * `VENUE_RATE_LIMITED`    — upstream 429; `Retry-After: 1`
                                          header is set so the client can
                                          backoff cleanly.
          headers:
            Retry-After:
              description: seconds to wait before retrying (rate-limit case only)
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ----- FEED -----
  /v1/feed:
    get:
      tags: [feed]
      operationId: getFeed
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 20, default: 20 }
      responses:
        "200":
          description: page of feed items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFeedItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ----- SOCIAL -----
  /v1/users/{username}/follow:
    parameters:
      - in: path
        name: username
        required: true
        schema: { type: string }
    post:
      tags: [social]
      operationId: follow
      responses:
        "200":
          description: follow status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: cannot follow self
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      tags: [social]
      operationId: unfollow
      responses:
        "204": { description: unfollowed }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests:
    get:
      tags: [social]
      operationId: listFollowRequests
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: pending requests
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfFollowRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/follow-requests/{id}/approve:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: approveFollowRequest
      responses:
        "200":
          description: approved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FollowResult" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/follow-requests/{id}/decline:
    parameters:
      - in: path
        name: id
        required: true
        description: follower user id
        schema: { type: string, format: uuid }
    post:
      tags: [social]
      operationId: declineFollowRequest
      responses:
        "204": { description: declined }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- COLLECTIONS -----
  /v1/collections:
    get:
      tags: [collections]
      operationId: listCollections
      responses:
        "200":
          description: list of own collections
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfCollection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [collections]
      operationId: createCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 50 }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/collections/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: query
        name: cursor
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    get:
      tags: [collections]
      operationId: getCollection
      description: |
        Phase 6a. OptionalAuth: owner reads their own row (any
        visibility); anyone (including anonymous viewers) reads a
        `visibility=public` row. Private rows for non-owners collapse
        to 404 — we do not leak existence.
      security:
        - bearerAuth: []
        - {}
      responses:
        "200":
          description: collection with entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Collection"
                  - type: object
                    properties:
                      entries: { $ref: "#/components/schemas/PageOfCollectionEntry" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [collections]
      operationId: updateCollection
      description: |
        Update a collection's name and/or visibility. At least one field
        must be present in the body. Sending `{}` is a 422. Phase 6a
        renamed this from `renameCollection` and added the `visibility`
        field.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCollectionRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collection" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [collections]
      operationId: deleteCollection
      responses:
        "204": { description: soft-deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [collections]
      operationId: addCollectionEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [beverage_id]
              properties:
                beverage_id: { type: string, format: uuid }
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: added (idempotent) }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/collections/{id}/entries/{beverage_id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: beverage_id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [collections]
      operationId: updateCollectionEntry
      description: |
        Status: scaffold-for-Phase6 (collection entry note edits, low cost
        to keep pre-wired). Endpoint is intentionally pre-wired; no Flutter
        caller in MVP.
      x-internal: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        "204": { description: updated }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [collections]
      operationId: removeCollectionEntry
      responses:
        "204": { description: removed }
        "404": { $ref: "#/components/responses/NotFound" }

  # ----- SEARCH -----
  /v1/search:
    get:
      tags: [search]
      operationId: search
      security: []
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [beverage, brewery] }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: search results (mixed types)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PageOfSearchResult" }

  # ----- TAXONOMY / FEEDBACK -----
  /v1/categories:
    get:
      tags: [taxonomy]
      operationId: getCategories
      description: |
        Status: scaffold-for-Phase5 — server-validated taxonomy used by the
        admin surface to populate category dropdowns. Endpoint is
        intentionally pre-wired; Flutter MVP uses local `kCategoryStrings`.
      x-internal: true
      security: []
      responses:
        "200":
          description: SPEC §2.1 categories with locale-aware labels
          headers:
            Cache-Control:
              description: |
                Stage 7 (M-3.5) — emitted by middleware:
                `public, max-age=3600, stale-while-revalidate=86400`.
                Taxonomy effectively never changes during a deploy
                window; stale-while-revalidate lets intermediaries
                background-refresh.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryLabel" }

  /v1/flavor-tags:
    get:
      tags: [taxonomy]
      operationId: getFlavorTags
      security: []
      responses:
        "200":
          description: SPEC §4.3 taxonomy
          headers:
            Cache-Control:
              description: |
                Stage 7 (M-3.5) — emitted by middleware:
                `public, max-age=3600, stale-while-revalidate=86400`.
                Taxonomy is effectively immutable during a deploy
                window.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FlavorTag" }

  /v1/reference/regions:
    get:
      tags: [taxonomy]
      operationId: getRegions
      description: |
        Migration 016 — returns the full 8-region × 47-prefecture seed
        graph in canonical sort order (regions.sort_order, then
        prefectures.sort_order). Each region carries its i18n name +
        the ordered list of its prefectures. One round-trip is enough
        to populate the admin "Pick a prefecture" dropdown or any
        client-side filter UI. Mirrors the cache/auth shape of
        /v1/categories + /v1/flavor-tags — public, long Cache-Control
        TTL (seed-only data; effectively immutable during a deploy
        window).
      security: []
      responses:
        "200":
          description: regions + prefectures reference graph
          headers:
            Cache-Control:
              description: |
                `public, max-age=3600, stale-while-revalidate=86400`
                emitted by middleware.
              schema: { type: string }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RegionWithPrefectures" }

  /v1/beverage-requests:
    post:
      tags: [taxonomy]
      operationId: submitBeverageRequest
      description: |
        Status: scaffold-for-Phase5 — user-submitted beverages will wire the
        user-side form on top of this endpoint. Endpoint is intentionally
        pre-wired; no Flutter caller in MVP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payload]
              properties:
                payload:
                  type: object
                  additionalProperties: true
      responses:
        "202":
          description: queued for admin review
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/Validation" }

  # ==========================================================================
  # Phase 5a — admin surface. All endpoints require Bearer auth + a moderator
  # or admin role (specified per-operation). 403 ROLE_REQUIRED on mismatch;
  # 401 ACCOUNT_DELETED on revoked JWTs (SEC-006).
  # ==========================================================================

  /v1/admin/beverage-requests:
    get:
      tags: [admin]
      operationId: adminListBeverageRequests
      description: |
        List user-submitted beverage addition requests. Requires moderator
        or admin role. Cursor-paginated.
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [pending, approved, rejected] }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of requests
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdminBeverageRequest" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/beverage-requests/{id}/approve:
    post:
      tags: [admin]
      operationId: adminApproveBeverageRequest
      description: |
        Approve a pending beverage request and insert a canonical beverage
        in the same transaction. Admin role required. The admin supplies
        the canonical fields (brewery_id, category_id, name_i18n, ...)
        based on the user-submitted payload.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBeverageRequestApproval" }
      responses:
        "200":
          description: approved; beverage created
          content:
            application/json:
              schema:
                type: object
                required: [request_id, beverage_id]
                properties:
                  request_id: { type: string, format: uuid }
                  beverage_id: { type: string, format: uuid }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/beverage-requests/{id}/reject:
    post:
      tags: [admin]
      operationId: adminRejectBeverageRequest
      description: |
        Reject a pending beverage request with required reviewer notes.
        Moderator or admin role.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes: { type: string, minLength: 1, maxLength: 500 }
      responses:
        "200":
          description: rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id: { type: string, format: uuid }
                  status: { type: string, enum: [rejected] }
                  notes: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/check-ins/{id}/moderate:
    post:
      tags: [admin]
      operationId: adminModerateCheckin
      description: |
        Soft-delete a check-in regardless of owner. Moderator or admin role.
        Optional notes are recorded in the structured access log.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, maxLength: 500 }
      responses:
        "204":
          description: moderated
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/comments:
    get:
      tags: [admin]
      operationId: adminListComments
      description: |
        Phase 6a. Moderator/admin review queue for comments. `status` is
        one of:
          - `visible` (default) — returns all comments (both live and
            soft-deleted; the row carries `deleted_at` for distinguishing).
          - `deleted` — only soft-deleted rows. Most-recent moderation
            metadata is joined from `moderation_log`.
        Cursor pagination on (created_at, id) DESC.
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [visible, deleted], default: visible }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of comments
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdminComment" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/comments/{id}/moderate:
    post:
      tags: [admin]
      operationId: adminModerateComment
      description: |
        Phase 6a. Soft-delete a comment regardless of ownership. Moderator
        or admin role. Optional `notes` are recorded on the
        moderation_log row and the structured access log.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string, maxLength: 1000 }
      responses:
        "204":
          description: moderated
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/moderation-log:
    get:
      tags: [admin]
      operationId: adminListModerationLog
      description: |
        Stage 7 (M-8.1). Moderator audit trail. Returns rows from
        `moderation_log` (migration 008), newest first. Moderator or
        admin role. Filter by target_type / target_id (uses
        idx_moderation_log_target) or by moderator_id (uses
        idx_moderation_log_moderator). Cursor pagination on
        (created_at, id) DESC.
      parameters:
        - in: query
          name: target_type
          required: false
          schema: { type: string, enum: [check_in, comment, user, beverage_request, beverage, brewery] }
        - in: query
          name: target_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: moderator_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of moderation log entries
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ModerationLogEntry" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/me:
    get:
      tags: [admin]
      operationId: adminMe
      description: |
        Current operator's identity for the React admin client. Authenticated
        via the kamos_admin_access cookie (Path=/v1/admin); /v1/users/me is
        Bearer-only and unreachable by the cookie. Moderator or admin role.
      responses:
        "200":
          description: current operator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/users:
    get:
      tags: [admin]
      operationId: adminListUsers
      description: |
        List users. Moderator or admin role. Stage 8: the three
        exact-match params (`username`, `email`, `id`) short-circuit
        the cursor and return at most one row; `has_more` is always
        false in that case. Precedence on overlap is id > username
        > email. `username` and `email` match via LOWER() to hit the
        case-insensitive partial unique indexes.
      parameters:
        - in: query
          name: role
          required: false
          schema: { type: string, enum: [user, moderator, admin] }
        - in: query
          name: include_deleted
          required: false
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: username
          required: false
          schema: { type: string }
          description: case-insensitive exact match
        - in: query
          name: email
          required: false
          schema: { type: string }
          description: case-insensitive exact match
        - in: query
          name: id
          required: false
          schema: { type: string, format: uuid }
          description: UUID exact match
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of users
          content:
            application/json:
              schema:
                type: object
                required: [items, has_more]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdminUser" }
                  next_cursor: { type: string, nullable: true }
                  has_more: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/admin/users/{id}/role:
    post:
      tags: [admin]
      operationId: adminUpdateUserRole
      description: |
        Update a user's role. Admin only. Self-role-changes are blocked
        with 403 to prevent accidental admin lockout.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminUserRoleUpdate" }
      responses:
        "200":
          description: role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string, format: uuid }
                  role: { type: string, enum: [user, moderator, admin] }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/users/{id}/suspend:
    post:
      tags: [admin]
      operationId: adminSuspendUser
      description: |
        Admin-initiated soft-delete. Sets the 30-day username hold and
        adds the user id to the SEC-006 revocation cache so the user's
        outstanding JWTs are rejected immediately.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: suspended
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # =========================================================================
  # Stage 8 — admin direct catalog CRUD (beverages + breweries).
  # Admin role required on every endpoint. Each mutation bundles a
  # moderation_log audit row in the same transaction.
  # =========================================================================

  /v1/admin/beverages:
    get:
      tags: [admin]
      operationId: adminListBeverages
      description: |
        List beverages for admin tooling. Optional FTS (`q`,
        websearch_to_tsquery against idx_beverages_name_tsv), exact
        filters (`brewery_id`, `category_id`, `category_slug`, `id`).
        `id` short-circuits the cursor. `include_deleted=1` surfaces
        soft-deleted rows for the admin "trash" view.
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: brewery_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: category_id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: category_slug
          required: false
          schema: { type: string, enum: [nihonshu, shochu, liqueur] }
        - in: query
          name: id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: include_deleted
          required: false
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of beverages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBeverageList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: adminCreateBeverage
      description: |
        Insert a canonical beverage. Admin only. The client may supply
        either `category_id` (UUID) or `category_slug` (one of
        `nihonshu` / `shochu` / `liqueur`); the denormalized
        `beverages.category_slug` column is then set server-side by
        the existing trigger from the resolved `category_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBeverageCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBeverage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/beverages/{id}:
    get:
      tags: [admin]
      operationId: adminGetBeverage
      description: |
        Return one beverage (including soft-deleted rows so the admin
        can surface the Restore action).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: beverage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBeverage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [admin]
      operationId: adminUpdateBeverage
      description: |
        Partial-update a beverage. Only fields present in the body are
        changed. To clear a nullable column (subcategory_i18n,
        description_i18n, label_image_url), send the field with all-
        empty i18n locales or an empty string.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBeverageUpdate" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBeverage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [admin]
      operationId: adminSoftDeleteBeverage
      description: |
        Soft-delete a beverage (sets deleted_at = NOW()). Existing
        check-ins and collection entries keep their FK reference; the
        row stays in the DB and can be restored. The public catalog
        endpoints filter deleted_at IS NULL.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: soft-deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/beverages/{id}/restore:
    post:
      tags: [admin]
      operationId: adminRestoreBeverage
      description: |
        Clear deleted_at on a tombstoned beverage; the row reappears
        in the public catalog on the next read.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: restored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBeverage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/admin/breweries:
    get:
      tags: [admin]
      operationId: adminListBreweries
      description: |
        List breweries for admin tooling. Optional FTS (`q`,
        websearch_to_tsquery against idx_breweries_name_tsv) or exact
        UUID lookup (`id`). `include_deleted=1` surfaces soft-deleted
        rows.
      parameters:
        - in: query
          name: q
          required: false
          schema: { type: string }
        - in: query
          name: id
          required: false
          schema: { type: string, format: uuid }
        - in: query
          name: include_deleted
          required: false
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: cursor
          required: false
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        "200":
          description: page of breweries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBreweryList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [admin]
      operationId: adminCreateBrewery
      description: |
        Insert a canonical brewery. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBreweryCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBrewery" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/Validation" }

  /v1/admin/breweries/{id}:
    get:
      tags: [admin]
      operationId: adminGetBrewery
      description: |
        Return one brewery (including soft-deleted rows).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: brewery
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBrewery" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [admin]
      operationId: adminUpdateBrewery
      description: |
        Partial-update a brewery.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdminBreweryUpdate" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBrewery" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Validation" }
    delete:
      tags: [admin]
      operationId: adminSoftDeleteBrewery
      description: |
        Soft-delete a brewery (sets deleted_at = NOW()). Fails with
        409 BREWERY_HAS_LIVE_BEVERAGES when at least one beverage
        still references the brewery with deleted_at IS NULL — admin
        must soft-delete or reassign the dependent beverages first.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: soft-deleted
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: brewery still has live beverages (code BREWERY_HAS_LIVE_BEVERAGES)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /v1/admin/breweries/{id}/restore:
    post:
      tags: [admin]
      operationId: adminRestoreBrewery
      description: |
        Clear deleted_at on a tombstoned brewery.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: restored
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminBrewery" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    # Stage 4 — admin cookie auth (SEC-001). The React admin client
    # signs in via POST /v1/auth/admin-login, which sets the three
    # HttpOnly cookies below. The /v1/admin/* surface accepts either
    # cookie auth or bearerAuth (transition window); CSRF protection
    # only applies to cookie-authenticated mutating requests.
    adminCookieAuth:
      type: apiKey
      in: cookie
      name: kamos_admin_access
      description: |
        HttpOnly + Secure + SameSite=Strict access token cookie.
        Browser-only; never readable from JS. Path=/v1/admin.
    adminCsrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        CSRF double-submit token. Required on POST / PATCH / PUT /
        DELETE under /v1/admin when the request is cookie-authed.
        The value MUST match the kamos_admin_csrf cookie.

  responses:
    Unauthorized:
      description: missing or invalid token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: authenticated but not allowed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: not found (or hidden by privacy)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: uniqueness or state conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Validation:
      description: validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error, code]
      properties:
        error:
          type: string
          description: human-readable message
        code:
          type: string
          description: machine code (UPPER_SNAKE_CASE)

    I18nText:
      type: object
      description: |
        i18n object. `en` and `ja` are typically present; `ko` is optional.
        Per SPEC §6.5 fallback, clients should display `ko` if present, else
        `en`. Same rule for ja → en.
      required: [en]
      properties:
        en: { type: string }
        ja: { type: string }
        ko: { type: string }

    CategoryLabel:
      type: object
      required: [slug, label_i18n]
      properties:
        slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
        label_i18n:
          $ref: "#/components/schemas/I18nText"
          description: |
            SPEC §2.1 canonical strings:
            * en: 'Nihonshu (Sake)' | 'Shochu' | 'Liqueur'
            * ja: '日本酒' | '焼酎' | 'リキュール'
            * ko: '니혼슈 (사케)' | '쇼츄' | '리큐어'

    User:
      type: object
      required: [id, username, display_username, email, email_verified, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    UserStats:
      type: object
      required: [checkins, unique, followers, following]
      properties:
        checkins: { type: integer }
        unique: { type: integer }
        followers: { type: integer }
        following: { type: integer }

    Me:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          required: [stats, role]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }
            role:
              # Phase 5a: surfaces RBAC state so the admin client can branch
              # on privileges. Read fresh from users.role on every request.
              $ref: "#/components/schemas/UserRole"
            deleted_at:
              type: string
              format: date-time
              nullable: true
              description: |
                Soft-delete timestamp. Normally null; non-null only in the
                rare window between admin suspension and SoftDeleteCache
                refresh.

    PublicUser:
      type: object
      description: |
        Privacy-safe User projection used by GET /v1/users/{username}.
        Email and email_verified are intentionally omitted — they are private
        to the owner and exposed only via /v1/users/me.
      required: [id, username, display_username, display_name, locale, privacy_mode, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, description: "lowercase canonical handle" }
        display_username: { type: string, description: "case-preserved" }
        display_name: { type: string, maxLength: 50 }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, maxLength: 200, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    PublicProfile:
      allOf:
        - $ref: "#/components/schemas/PublicUser"
        - type: object
          required: [stats, restricted]
          properties:
            stats: { $ref: "#/components/schemas/UserStats" }
            follow_state:
              type: string
              enum: [accepted, pending, ""]
              description: status of viewer→target follow; absent if no viewer
            restricted:
              type: boolean
              description: true when target is private and viewer not approved

    UpdateMeRequest:
      type: object
      description: |
        PATCH semantics: omit a field to leave it unchanged. For the
        clearable optional fields (`bio`, `avatar_url`) send an explicit
        `null` to clear the existing value. `display_name`, `locale`, and
        `privacy_mode` are non-clearable — omit to leave unchanged.
      properties:
        display_name: { type: string, minLength: 1, maxLength: 50 }
        bio: { type: string, maxLength: 200, nullable: true }
        avatar_url: { type: string, format: uri, nullable: true }
        locale: { type: string, enum: [en, ja, ko] }
        privacy_mode: { type: string, enum: [public, private] }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[A-Za-z0-9_]{3,30}$"
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string, minLength: 1, maxLength: 50 }
        locale: { type: string, enum: [en, ja, ko] }
        bio: { type: string, maxLength: 200, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    GoogleLoginRequest:
      type: object
      required: [id_token]
      properties:
        id_token: { type: string, description: "Google ID token" }
        username:
          type: string
          description: "Required only on first login when a username can't be derived"
        locale:
          type: string
          enum: [en, ja, ko]

    AuthResponse:
      type: object
      required: [user, access_token, refresh_token, token_type, expires_in, refresh_expires_in]
      properties:
        user: { $ref: "#/components/schemas/User" }
        access_token: { type: string, description: "Bearer JWT (HS256), short-lived" }
        refresh_token:
          type: string
          description: |
            Raw refresh secret (base64-rawurl, 43 chars). Long-lived but
            revocable; rotated on every use via POST /v1/auth/refresh. The
            server stores only its SHA-256 hash.
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: "access-token TTL in seconds" }
        refresh_expires_in: { type: integer, description: "refresh-token TTL in seconds" }

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string, description: "raw secret previously issued by the server" }

    LogoutRequest:
      type: object
      description: |
        Optional body. With `refresh_token`, only that single token is revoked.
        Without, every active refresh token for the authed user is revoked
        (sign-out-everywhere).
      properties:
        refresh_token: { type: string }

    Region:
      type: object
      description: |
        Migration 016 — one row of the seed `regions` reference table
        (Japan's 8 traditional regions). Used standalone and as the
        embedded `region` field of `Prefecture`.
      required: [id, slug, name, sort_order]
      properties:
        id: { type: string, format: uuid }
        slug:
          type: string
          description: |
            stable lowercase slug (e.g. `hokkaido`, `kanto`,
            `kyushu_okinawa`).
        name:
          $ref: "#/components/schemas/I18nText"
        sort_order:
          type: integer
          minimum: 0
          description: canonical render order (1–8).

    Prefecture:
      type: object
      description: |
        Migration 016 — one row of the seed `prefectures` reference
        table. `region` is embedded so a brewery's `prefecture` field
        carries enough context to render "Niigata (Chūbu)" without a
        second lookup.
      required: [id, slug, name, sort_order, region]
      properties:
        id: { type: string, format: uuid }
        slug:
          type: string
          description: |
            stable lowercase slug (e.g. `niigata`, `tokyo`,
            `kagoshima`); accepted by admin write paths as
            `prefecture_slug` on AdminBreweryCreate / AdminBreweryUpdate.
        name:
          $ref: "#/components/schemas/I18nText"
        sort_order:
          type: integer
          minimum: 0
          description: JIS prefecture code (1=Hokkaido … 47=Okinawa).
        region:
          $ref: "#/components/schemas/Region"

    PrefectureInline:
      type: object
      description: |
        Per-prefecture shape inside `RegionWithPrefectures.prefectures`.
        Identical to `Prefecture` minus the embedded `region` back-
        reference (the parent region is the array container, so the
        nested copy would be redundant). Extracted as a named schema so
        codegen surfaces a reusable type rather than an anonymous
        nested array element.
      required: [id, slug, name, sort_order]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { $ref: "#/components/schemas/I18nText" }
        sort_order: { type: integer, minimum: 0 }

    RegionWithPrefectures:
      type: object
      description: |
        Flattened response shape returned by `GET /v1/reference/regions`.
        Each region carries its i18n name + the ordered list of its
        prefectures (also i18n-named). One round-trip is enough to
        populate the admin "Pick a prefecture" dropdown or any
        client-side filter UI. Nested prefectures drop the back-
        reference to `region` (the container is the region) to keep
        the payload compact.
      required: [id, slug, name, sort_order, prefectures]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        name: { $ref: "#/components/schemas/I18nText" }
        sort_order: { type: integer, minimum: 0 }
        prefectures:
          type: array
          items: { $ref: "#/components/schemas/PrefectureInline" }

    Brewery:
      type: object
      description: |
        Optional fields (`prefecture`, `founded_year`, `website`,
        `description`, `beverage_count`) use the **absent-when-unknown**
        convention: the Go server emits them with `omitempty`, so the JSON
        key is omitted entirely rather than set to `null`. Clients should
        treat an absent key the same as `null`.

        Migration 016: `prefecture` is now a nested `Prefecture` object
        (which itself embeds its `Region`). The previous free-text
        `prefecture` / `region` string fields are gone. The brewery's
        region is derivable via `brewery.prefecture.region`.
      required: [id, name, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        prefecture: { $ref: "#/components/schemas/Prefecture" }
        founded_year: { type: integer }
        website: { type: string, format: uri }
        description: { $ref: "#/components/schemas/I18nText" }
        beverage_count:
          type: integer
          minimum: 0
          description: |
            Number of beverages associated with this brewery. Populated by
            `GetBrewery` and `ListBreweries`; absent in nested `BreweryRef`
            embeddings and in `/v1/search` brewery results.
        created_at: { type: string, format: date-time }

    Beverage:
      type: object
      description: |
        Optional fields (`subcategory`, `abv`, `polishing_ratio`,
        `description`, `label_image_url`) use the **absent-when-unknown**
        convention: the Go server emits them with `omitempty`, so the
        JSON key is omitted entirely rather than set to `null`. The
        exception is `avg_rating`, which is `*float64` without `omitempty` —
        it is always present and is `null` when no ratings exist.

        Migration 016 dropped the per-beverage `prefecture` / `region`
        free-text columns. A beverage's locality is now derived through
        its `brewery.prefecture` (which itself nests `region`).

        List endpoints (`GET /v1/beverages`, `GET /v1/breweries/{id}` inline
        beverages page, `GET /v1/search` beverage results) ship a slim
        projection that **omits the i18n JSONB fields `subcategory` and
        `description`** on every row to cut payload size by ~30%. Both
        fields are always present on `BeverageDetail` (the single-item
        detail response). Clients should treat the fields as optional on
        the wire and re-fetch detail when the user opens a beverage.
      required: [id, name, brewery, category, flavor_profile, avg_rating, check_in_count, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/Brewery" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        subcategory: { $ref: "#/components/schemas/I18nText" }
        abv: { type: number }
        polishing_ratio: { type: integer, description: "Nihonshu only" }
        flavor_profile:
          type: array
          items: { type: string, description: "flavor tag slug" }
        description: { $ref: "#/components/schemas/I18nText" }
        label_image_url: { type: string, format: uri }
        avg_rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        check_in_count: { type: integer }
        created_at: { type: string, format: date-time }

    FlavorAggregate:
      type: object
      required: [slug, dimension, name, uses]
      properties:
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }
        uses: { type: integer }

    FlavorTag:
      type: object
      required: [id, slug, dimension, name]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        dimension: { type: string, enum: [sweetness, body, acidity, character, finish] }
        name: { $ref: "#/components/schemas/I18nText" }

    BeverageDetail:
      allOf:
        - $ref: "#/components/schemas/Beverage"
        - type: object
          required: [aggregated_flavor, recent_check_ins]
          properties:
            aggregated_flavor:
              type: array
              items: { $ref: "#/components/schemas/FlavorAggregate" }
            recent_check_ins:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }

    CheckinUser:
      type: object
      required: [id, username, display_username, display_name]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }

    BeverageRef:
      type: object
      description: |
        Compact beverage embedding used by check-in / feed / collection
        entries. `label_image_url` follows the absent-when-unknown
        convention (Go `omitempty`).
      required: [id, name, brewery, category]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        brewery: { $ref: "#/components/schemas/BreweryRef" }
        category: { $ref: "#/components/schemas/CategoryLabel" }
        label_image_url: { type: string, format: uri }

    BreweryRef:
      type: object
      description: |
        Compact brewery embedding used by check-in / feed / collection
        entries. `prefecture` (a nested Prefecture that itself embeds
        its Region) follows the absent-when-unknown convention (Go
        `omitempty`). Migration 016 replaced the free-text `region`
        string with this nested shape.
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { $ref: "#/components/schemas/I18nText" }
        prefecture: { $ref: "#/components/schemas/Prefecture" }

    PhotoRef:
      type: object
      required: [url, sort_order]
      properties:
        url: { type: string, format: uri }
        sort_order: { type: integer, minimum: 0, maximum: 3 }

    Price:
      type: object
      required: [amount, currency, mode]
      properties:
        amount: { type: number, minimum: 0 }
        currency: { type: string, enum: [JPY, KRW, USD] }
        mode: { type: string, enum: [serving, bottle] }

    Checkin:
      type: object
      required: [id, user, beverage, tags, photos, toasts, you_toasted, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating:
          type: number
          nullable: true
          minimum: 0.5
          maximum: 5.0
          description: |
            SPEC §4.2 / §6.2: 0.5–5.0 in 0.5 steps. Optional — `null` is valid
            and means "I tried this". Emit as a number, never a string.
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        photos:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/PhotoRef" }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other], nullable: true }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other], nullable: true }
        venue:
          $ref: "#/components/schemas/VenueRef"
          nullable: true
          description: |
            Phase 4 venue projection. Absent when the check-in has no venue.
        toasts: { type: integer }
        you_toasted: { type: boolean }
        # Phase 6a — see FeedItem.comment_count for the rationale on
        # leaving this out of `required`.
        comment_count: { type: integer, default: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CheckinSummary:
      type: object
      required: [id, user, photos, tags, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        photos:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/PhotoRef" }
        tags:
          type: array
          description: |
            Flavor-tag chips so the beverage detail "recent check-ins"
            rows can render rich cards without a follow-up round trip.
          items: { $ref: "#/components/schemas/FlavorTag" }
        serving_style:
          type: string
          enum: [glass, carafe, bottle, can, other]
          nullable: true
        created_at: { type: string, format: date-time }

    CreateCheckinRequest:
      type: object
      required: [beverage_id]
      properties:
        beverage_id: { type: string, format: uuid }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string, description: "flavor tag slug" }
        photos:
          type: array
          maxItems: 4
          items: { type: string, format: uri }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }
        venue:
          $ref: "#/components/schemas/CheckinVenueInput"
          nullable: true
          description: |
            Phase 4 optional venue tag. Three accepted shapes:
              * { id }                    — attach an existing venue UUID.
              * { foursquare_id, name }   — upsert by Foursquare id.
              * empty object              — silently dropped.

    UpdateCheckinRequest:
      type: object
      description: |
        `beverage_id` is intentionally NOT in this schema — SPEC §4.4 forbids
        changing the beverage on an existing check-in. If present in the body,
        the server returns 422.
      properties:
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, maxLength: 500, nullable: true }
        tags:
          type: array
          items: { type: string }
        price: { $ref: "#/components/schemas/Price", nullable: true }
        purchase_type: { type: string, enum: [on_premise, retail, gift, other] }
        serving_style: { type: string, enum: [glass, carafe, bottle, can, other] }

    ToastState:
      type: object
      required: [toasts, you_toasted]
      properties:
        toasts: { type: integer }
        you_toasted: { type: boolean }

    # ----- Venues (Phase 4) -----
    VenueRef:
      type: object
      description: |
        Lightweight projection of a venue embedded on Checkin / FeedItem.
        Feed cards render "at <name>, <locality>".
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        locality: { type: string, nullable: true }
        country: { type: string, nullable: true }

    Venue:
      type: object
      required: [id, name, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        foursquare_id: { type: string, nullable: true }
        name: { type: string }
        address: { type: string, nullable: true }
        lat: { type: number, nullable: true, minimum: -90, maximum: 90 }
        lng: { type: number, nullable: true, minimum: -180, maximum: 180 }
        country: { type: string, nullable: true }
        prefecture: { type: string, nullable: true }
        locality: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CheckinVenueInput:
      type: object
      description: |
        Optional venue payload on POST /v1/check-ins. Three accepted shapes:
          * `{ id }` — attach an existing venue UUID.
          * `{ foursquare_id, name, ... }` — upsert by Foursquare id.
          * empty / nothing matching — silently dropped (200/201, venue
            stays absent on the resulting check-in).
      properties:
        id: { type: string, format: uuid }
        foursquare_id: { type: string }
        name: { type: string }
        address: { type: string }
        lat: { type: number, minimum: -90, maximum: 90 }
        lng: { type: number, minimum: -180, maximum: 180 }
        country: { type: string }
        prefecture: { type: string }
        locality: { type: string }

    FoursquarePlace:
      type: object
      description: |
        Foursquare Place projected to the KAMOS shape at the client edge.
        These are NOT venue rows — they are search results. Use the
        `foursquare_id` to attach one via POST /v1/check-ins.
      required: [foursquare_id, name]
      properties:
        foursquare_id: { type: string }
        name: { type: string }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        country: { type: string }
        prefecture: { type: string }
        locality: { type: string }

    VenueSearchResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/FoursquarePlace" }

    FeedItem:
      type: object
      description: |
        Stage 5: the previous `photo_count` integer was replaced by a
        hydrated `photos` array so feed cards can render the actual
        photo grid without a follow-up request.
      required: [id, user, beverage, tags, photos, toasts, you_toasted, comment_count, created_at]
      properties:
        id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        rating: { type: number, nullable: true, minimum: 0.5, maximum: 5.0 }
        review: { type: string, nullable: true, maxLength: 500 }
        tags:
          type: array
          items: { $ref: "#/components/schemas/FlavorTag" }
        photos:
          type: array
          maxItems: 4
          items: { $ref: "#/components/schemas/PhotoRef" }
        toasts: { type: integer }
        you_toasted: { type: boolean }
        comment_count: { type: integer, default: 0 }
        venue:
          oneOf:
            - $ref: "#/components/schemas/VenueRef"
          nullable: true
          description: Absent when the check-in has no venue attached.
        created_at: { type: string, format: date-time }

    Comment:
      type: object
      description: |
        Phase 6a. Flat comment on a check-in. `user` embeds the slim
        CheckinUser shape — email + email_verified are NEVER on the wire.
      required: [id, check_in_id, user, body, created_at]
      properties:
        id: { type: string, format: uuid }
        check_in_id: { type: string, format: uuid }
        user: { $ref: "#/components/schemas/CheckinUser" }
        body: { type: string, minLength: 1, maxLength: 500 }
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Server-side-filtered on list; exposed for completeness.

    FollowRequest:
      type: object
      required: [user_id, username, display_username, display_name, created_at]
      properties:
        user_id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        bio: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    FollowResult:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [accepted, pending] }

    SocialUser:
      type: object
      required: [id, username, display_username, display_name, followed_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string, format: uri, nullable: true }
        followed_at: { type: string, format: date-time }

    Collection:
      type: object
      required: [id, owner_id, name, entry_count, visibility, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        owner_id:
          type: string
          format: uuid
          description: |
            Phase 6a. The user_id of the collection's owner. Exposed so
            clients can gate owner-only UI (visibility toggle, edit
            controls) without a separate /v1/users/me round trip and
            without leaking the owner's email or other private fields.
        name: { type: string, minLength: 1, maxLength: 50 }
        entry_count: { type: integer }
        visibility:
          type: string
          enum: [private, public]
          default: private
          description: |
            Phase 6a. New collections default to `private`. Toggle via
            PATCH /v1/collections/{id} with `{"visibility":"public"}`.
            Public collections appear in GET
            /v1/users/{username}/collections for non-owners.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UpdateCollectionRequest:
      type: object
      description: |
        PATCH /v1/collections/{id}. Both fields are optional in isolation;
        at least one must be present (sending {} is a 422). Phase 6a added
        `visibility`.
      properties:
        name: { type: string, minLength: 1, maxLength: 50 }
        visibility:
          type: string
          enum: [private, public]

    CollectionEntry:
      type: object
      required: [beverage, added_at]
      properties:
        beverage: { $ref: "#/components/schemas/BeverageRef" }
        note: { type: string, maxLength: 200, nullable: true }
        added_at: { type: string, format: date-time }

    SearchResult:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [beverage, brewery] }
        beverage: { $ref: "#/components/schemas/Beverage", nullable: true }
        brewery: { $ref: "#/components/schemas/Brewery", nullable: true }

    # ----- Page<T> envelopes -----
    PageBase:
      type: object
      required: [items, has_more]
      properties:
        next_cursor:
          type: string
          nullable: true
          description: "opaque keyset cursor; absent on last page"
        has_more: { type: boolean }
    PageOfBeverage:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Beverage" }
    PageOfBrewery:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Brewery" }
    PageOfCheckin:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Checkin" }
    PageOfCheckinSummary:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CheckinSummary" }
    PageOfFeedItem:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FeedItem" }
    PageOfComment:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Comment" }
    PageOfFollowRequest:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/FollowRequest" }
    PageOfSocialUser:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SocialUser" }
    PageOfPublicUser:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/PublicUser" }
    PageOfCollection:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Collection" }
    PageOfCollectionEntry:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/CollectionEntry" }
    PageOfSearchResult:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/SearchResult" }
    PageOfModerationLogEntry:
      allOf:
        - $ref: "#/components/schemas/PageBase"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/ModerationLogEntry" }

    # ========================================================================
    # Phase 5a — RBAC + admin
    # ========================================================================

    UserRole:
      type: string
      enum: [user, moderator, admin]
      description: |
        RBAC role from migration 007. Roles live on users.role and are
        not embedded in JWT claims, so a demotion takes effect on the
        next admin request rather than after the token TTL.

    AdminBeverageRequest:
      type: object
      required: [id, payload, status, created_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid, nullable: true }
        username:
          type: string
          nullable: true
          description: display_username of the submitter, or null if the user was hard-purged
        payload:
          type: object
          additionalProperties: true
          description: original user-submitted free-form payload
        status: { type: string, enum: [pending, approved, rejected] }
        reviewed_by:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }

    AdminBeverageRequestApproval:
      type: object
      description: |
        Field set mirrors AdminBeverageCreate so the admin can drive the
        approve and direct-create flows from the same form. Exactly one
        of `category_id` / `category_slug` is required; the handler
        resolves slug → UUID before the INSERT runs. An unknown
        `category_slug` returns `422 INVALID_CATEGORY_SLUG`.

        Migration 016 dropped beverages.prefecture / beverages.region —
        the beverage's locality is derived through the brewery's
        prefecture_id, so no per-beverage geo fields are accepted here.
        Recurate the brewery via PATCH /v1/admin/breweries/{id} before
        approving if the prefecture is wrong.
      required: [brewery_id, name_i18n]
      properties:
        brewery_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        category_slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
          description: alternative to category_id; resolved server-side
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        subcategory_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        abv:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 70
        polishing_ratio:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: nihonshu only — server CHECK rejects non-null values for other categories
        label_image_url: { type: string, format: uri, nullable: true }
        flavor_profile:
          type: array
          items: { type: string }
        description_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        notes:
          type: string
          nullable: true
          description: reviewer notes recorded on the request row

    AdminUser:
      type: object
      required: [id, username, display_username, email, email_verified, role, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_username: { type: string }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        role: { $ref: "#/components/schemas/UserRole" }
        created_at: { type: string, format: date-time }
        deleted_at:
          type: string
          format: date-time
          nullable: true

    AdminUserRoleUpdate:
      type: object
      required: [role]
      properties:
        role: { $ref: "#/components/schemas/UserRole" }

    # =======================================================================
    # Stage 8 — admin catalog CRUD (beverages + breweries)
    # =======================================================================

    AdminBeverage:
      description: |
        Admin variant of Beverage. Same shape as the public Beverage
        response, plus the nullable `deleted_at` so the admin UI can
        render the tombstone badge / Restore action.
      allOf:
        - $ref: "#/components/schemas/Beverage"
        - type: object
          required: [deleted_at]
          properties:
            deleted_at:
              type: string
              format: date-time
              nullable: true

    AdminBeverageCreate:
      type: object
      description: |
        Payload for POST /v1/admin/beverages. Exactly one of
        `category_id` (UUID) or `category_slug` (one of
        `nihonshu` / `shochu` / `liqueur`) is required — the admin SPA
        works in slugs since `/v1/taxonomy/categories` returns only
        slug + label. If both are sent, `category_id` wins. The
        denormalized `beverages.category_slug` column is set server-side
        by the existing trigger from the resolved `category_id`.
        `name_i18n.en` and `name_i18n.ja` are required; `ko` is optional.
        An unknown `category_slug` returns
        `422 INVALID_CATEGORY_SLUG`.
      required: [brewery_id, name_i18n]
      properties:
        brewery_id: { type: string, format: uuid }
        category_id:
          type: string
          format: uuid
          description: required if category_slug is not supplied
        category_slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
          description: required if category_id is not supplied
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        subcategory_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        abv:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 70
        polishing_ratio:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: nihonshu only — server CHECK rejects non-null values for other categories
        flavor_profile:
          type: array
          items: { type: string }
        description_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        label_image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 512
          description: must start with https://

    AdminBeverageUpdate:
      type: object
      description: |
        Partial-update body for PATCH /v1/admin/beverages/{id}. Every
        field is optional; omitted fields are left unchanged. To clear
        a nullable column, send the field with an all-empty I18nText
        (for `subcategory_i18n` / `description_i18n`) or an empty
        string (for `label_image_url`).

        At most one of `category_id` / `category_slug` may be supplied.
        If both are sent, `category_id` wins. An unknown
        `category_slug` returns `422 INVALID_CATEGORY_SLUG`.
      properties:
        brewery_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        category_slug:
          type: string
          enum: [nihonshu, shochu, liqueur]
          description: alternative to category_id; resolved server-side
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        subcategory_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        abv:
          type: number
          format: float
          nullable: true
          minimum: 0
          maximum: 70
        polishing_ratio:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
        flavor_profile:
          type: array
          items: { type: string }
        description_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true
        label_image_url:
          type: string
          format: uri
          nullable: true
          maxLength: 512

    AdminBeverageList:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminBeverage" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    AdminBrewery:
      description: |
        Admin variant of Brewery, exposing the nullable `deleted_at`.
      allOf:
        - $ref: "#/components/schemas/Brewery"
        - type: object
          required: [deleted_at]
          properties:
            deleted_at:
              type: string
              format: date-time
              nullable: true

    AdminBreweryCreate:
      type: object
      description: |
        Payload for POST /v1/admin/breweries. `name_i18n.en` and
        `name_i18n.ja` are required; `ko` optional. `founded_year`
        must be between 800 and 2100 to match the DB CHECK.

        Migration 016: `prefecture_slug` is optional; when supplied
        the handler resolves it to a `prefecture_id` (UUID) via the
        unique index on `prefectures.slug` before the INSERT. The set
        of valid slugs is the 47 prefectures returned by
        `GET /v1/reference/regions`. Unknown slug returns
        `422 INVALID_PREFECTURE_SLUG`. Omit `prefecture_slug` to leave
        the brewery without a curated prefecture.
      required: [name_i18n]
      properties:
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        prefecture_slug:
          type: string
          nullable: true
          maxLength: 64
          pattern: "^[a-z0-9_]+$"
          description: |
            Stable slug from `GET /v1/reference/regions`. Omit or send
            null when the brewery has no curated prefecture.
        founded_year:
          type: integer
          nullable: true
          minimum: 800
          maximum: 2100
        website:
          type: string
          format: uri
          nullable: true
          maxLength: 512
        description_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true

    AdminBreweryUpdate:
      type: object
      description: |
        Partial-update body for PATCH /v1/admin/breweries/{id}. Every
        field is optional; omitted fields are left unchanged.

        `prefecture_slug` semantics (mirrors `category_slug` on
        AdminBeverageUpdate, plus an explicit-clear use-case):

        * omitted (JSON key absent or `null`) → leave column unchanged.
        * non-empty slug → resolve and set `prefecture_id`.
        * empty string (`""`) → clear `prefecture_id` to NULL.

        Unknown slug returns `422 INVALID_PREFECTURE_SLUG`.
      properties:
        name_i18n: { $ref: "#/components/schemas/I18nText" }
        prefecture_slug:
          type: string
          nullable: true
          maxLength: 64
          pattern: "^[a-z0-9_]*$"
          description: |
            Stable slug from `GET /v1/reference/regions`. Send `""` to
            clear the prefecture column.
        founded_year:
          type: integer
          nullable: true
          minimum: 800
          maximum: 2100
        website:
          type: string
          format: uri
          nullable: true
          maxLength: 512
        description_i18n:
          allOf:
            - $ref: "#/components/schemas/I18nText"
          nullable: true

    AdminBreweryList:
      type: object
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AdminBrewery" }
        next_cursor: { type: string, nullable: true }
        has_more: { type: boolean }

    ModerationLogEntry:
      type: object
      description: |
        Stage 7 (M-8.1). One row of the audit trail for an admin action.
        Mirrors migration 008's `moderation_log` columns. `notes` is the
        free-form moderator reason (may be null); `metadata` is JSONB
        and varies by action (e.g. `role_change` carries
        {"old_role","new_role"}, `approve` carries {"beverage_id"}).
      required: [id, action, target_type, target_id, created_at]
      properties:
        id: { type: string, format: uuid }
        moderator_id:
          type: string
          format: uuid
          nullable: true
          description: null when the moderator was hard-purged
        action: { type: string, enum: [soft_delete, role_change, suspend, approve, reject, create, update, restore] }
        target_type: { type: string, enum: [check_in, comment, user, beverage_request, beverage, brewery] }
        target_id: { type: string, format: uuid }
        notes:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        created_at: { type: string, format: date-time }

    AdminComment:
      type: object
      description: |
        Phase 6a. Comment row for the moderator review queue. Embeds the
        same Comment shape returned by /v1/check-ins/{id}/comments and
        adds the most-recent moderation_log metadata (notes /
        moderated_by / moderated_at) when present.
      allOf:
        - $ref: "#/components/schemas/Comment"
        - type: object
          properties:
            moderation_notes: { type: string, nullable: true }
            moderated_by:
              type: string
              format: uuid
              nullable: true
              description: moderator user id; null when never moderated
            moderated_at:
              type: string
              format: date-time
              nullable: true
